<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Creative Knowledge Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f3f0;
  --card: #ffffff;
  --header-bg: #111111;
  --line: #e8e5df;
  --text: #111111;
  --sub: #555555;
  --mute: #999999;
  --pool-w: 360px;
  --header-h: 52px;
  --radius: 12px;
  --c-trend: #e8365d;
  --c-brand: #2563eb;
  --c-place: #16a34a;
  --c-food:  #d97706;
  --c-other: #6b7280;
}

body { font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ── Header ── */
.km-header { height: var(--header-h); background: var(--header-bg); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: relative; z-index: 1000; }
.km-title { font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: .12em; text-transform: uppercase; }
.km-header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.km-btn { padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; letter-spacing: .02em; }
.km-btn-primary { background: #fff; color: #111; }
.km-btn-primary:hover { background: #eee; }
.km-btn-ghost { background: transparent; color: #aaa; border: 1px solid #333; }
.km-btn-ghost:hover { border-color: #666; color: #fff; }
.km-btn-settings { background: transparent; border: none; color: #666; font-size: 16px; cursor: pointer; padding: 4px 8px; transition: color .15s; }
.km-btn-settings:hover { color: #ccc; }

/* ── Body ── */
.km-body { display: flex; height: calc(100vh - var(--header-h)); }

/* ── Left: material pool ── */
.km-pool { width: var(--pool-w); flex-shrink: 0; background: var(--card); border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.km-pool-head { padding: 12px 14px 8px; flex-shrink: 0; border-bottom: 1px solid var(--line); }
.km-pool-head-title { font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--text); display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
.km-pool-head-title .count { color: var(--mute); font-weight: 600; }
.km-pool-search input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
.km-pool-search input:focus { border-color: var(--text); }

.km-pool-keywords { padding: 9px 14px; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; max-height: 92px; overflow-y: auto; }
.km-kw-label { font-size: 9px; font-weight: 800; color: var(--mute); letter-spacing: .07em; text-transform: uppercase; width: 100%; margin-bottom: 1px; }
.km-kw { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1.5px solid var(--line); background: transparent; cursor: pointer; color: var(--sub); transition: all .12s; white-space: nowrap; }
.km-kw:hover { border-color: var(--text); color: var(--text); }
.km-kw.on { background: var(--c-trend); color: #fff; border-color: var(--c-trend); }
.km-kw .n { opacity: .6; margin-left: 2px; font-size: 9px; }

.km-pool-grid { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: start; }
.km-pool-grid::-webkit-scrollbar { width: 5px; }
.km-pool-grid::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* tile: padding-top portrait hack → NEVER overlaps regardless of image */
.km-tile { position: relative; padding-top: 140%; border-radius: 10px; overflow: hidden; cursor: grab; border: 2px solid transparent; background: var(--bg); transition: transform .12s, box-shadow .12s, border-color .12s; }
.km-tile:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.16); }
.km-tile:active { cursor: grabbing; }
.km-tile.dragging { opacity: .4; }
.km-tile.used { border-color: var(--c-place); }
.km-tile-media { position: absolute; inset: 0; overflow: hidden; }
.km-tile-media > * { position: absolute; inset: 0; width: 100%; height: 100%; }
.km-tile-media img { object-fit: cover; }
.km-tile-skeleton { background: linear-gradient(110deg, #ececec 30%, #f6f6f6 50%, #ececec 70%); }
.km-tile-swatch { display: flex; }
.km-tile-swatch div { flex: 1; height: 100%; }
.km-tile-fail { display: flex; align-items: center; justify-content: center; font-size: 26px; opacity: .35; }
.km-tile-overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 16px 8px 6px; background: linear-gradient(transparent, rgba(0,0,0,.8)); color: #fff; font-size: 10px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
.km-tile-badge { position: absolute; top: 6px; left: 6px; font-size: 8px; font-weight: 800; letter-spacing: .04em; padding: 2px 6px; border-radius: 5px; color: #fff; text-transform: uppercase; }
.km-tile-raw { position: absolute; top: 6px; left: 6px; font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 5px; background: rgba(0,0,0,.55); color: #fff; letter-spacing: .04em; }
.km-tile-add { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,.92); border: none; cursor: pointer; font-size: 15px; font-weight: 700; color: #111; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .12s; }
.km-tile:hover .km-tile-add { opacity: 1; }
.km-tile-check { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: var(--c-place); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.km-pool-empty { grid-column: 1/-1; text-align: center; color: var(--mute); font-size: 12px; padding: 40px 10px; line-height: 1.7; }

/* video placeholder + play badge (shared) */
.km-vidph { background: linear-gradient(135deg, #1c1c1c, #3a3a3a); cursor: pointer; }
.km-play-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 46px; height: 46px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; padding-left: 3px; cursor: pointer; transition: background .12s, transform .12s; z-index: 2; }
.km-play-badge:hover { background: rgba(0,0,0,.8); transform: translate(-50%,-50%) scale(1.08); }
.km-tile-reel { position: absolute; bottom: 6px; left: 6px; font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 5px; background: rgba(0,0,0,.6); color: #fff; letter-spacing: .04em; z-index: 2; }

/* trend view (micro-trend cards) */
.km-trend-head { padding: 12px 18px; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; font-size: 12px; color: var(--sub); }
.km-trend-head b { color: var(--text); }
.km-trend-grid { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-wrap: wrap; gap: 18px; align-content: flex-start; }
.km-trend-grid::-webkit-scrollbar { width: 6px; }
.km-trend-grid::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.km-tcard { background: var(--card); border: 1.5px solid var(--line); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; flex: 1 1 320px; min-width: 290px; max-width: 520px; }
.km-tcard.draft { border-color: var(--line); }
.km-tcard-imgs { display: grid; gap: 2px; background: var(--bg); flex-shrink: 0; }
.km-tcard-img { position: relative; overflow: hidden; background: #ececec; cursor: pointer; }
.km-tcard-img img, .km-tcard-img .km-tile-skeleton, .km-tcard-img .km-tcard-vid, .km-tcard-img .km-tcard-noimg, .km-tcard-img .km-tile-fail { position: absolute; inset: 0; width: 100%; height: 100%; }
.km-tcard-img img { object-fit: cover; }
.km-tcard-img .km-tile-skeleton { position: absolute; inset: 0; }
.km-tcard-vbadge { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,.6); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; padding-left: 1px; pointer-events: none; }
.km-tcard-vid { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #7d7d7d, #9c9c9c); cursor: pointer; }
.km-tcard-noimg { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #efe9df, #e6ddcc); color: #b8a888; font-size: 30px; }
.km-tcard-palette { display: flex; height: 22px; flex-shrink: 0; }
.km-tcard-palette div { flex: 1; position: relative; }
.km-tcard-palette div:hover::after { content: attr(data-hex); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #111; color: #fff; font-size: 8px; padding: 1px 4px; border-radius: 3px; white-space: nowrap; }
.km-tcard-palette-big { display: flex; }
.km-tcard-palette-big div { flex: 1; height: 100%; }
.km-tcard-more { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.5); color: #fff; font-size: 15px; font-weight: 800; }
.km-tcard-body { padding: 14px 16px 16px; }
.km-tcard-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.km-tcard-word { font-size: 18px; font-weight: 800; line-height: 1.3; color: var(--text); }
.km-tcard-draft-badge { font-size: 9px; font-weight: 800; letter-spacing: .05em; padding: 3px 8px; border-radius: 5px; background: #fbe7a1; color: #7a5c00; text-transform: uppercase; }
.km-tcard-ref { font-size: 10px; font-weight: 700; color: var(--c-trend); background: #fdeef2; padding: 3px 8px; border-radius: 5px; }
.km-tcard-memo { font-size: 12.5px; color: var(--sub); line-height: 1.6; margin-bottom: 10px; }
.km-tcard-foot { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.km-tcard-count { font-size: 10px; color: var(--mute); font-weight: 600; }
.km-tcard-srclink { font-size: 10px; color: var(--mute); text-decoration: none; }
.km-tcard-srclink:hover { color: var(--text); }
.km-tcard-toboard { margin-left: auto; font-size: 11px; font-weight: 700; border: 1.5px solid var(--text); background: var(--text); color: #fff; border-radius: 7px; padding: 6px 12px; cursor: pointer; transition: opacity .12s; }
.km-tcard-toboard:hover { opacity: .82; }
.km-trend-empty { grid-column: 1/-1; text-align: center; color: var(--mute); font-size: 13px; padding: 60px 20px; line-height: 1.8; }

/* trend detail modal */
.km-detail { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 2500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.km-detail.open { display: flex; }
.km-detail-panel { background: var(--card); border-radius: 18px; width: min(720px, 94vw); max-height: 90vh; overflow-y: auto; padding: 26px 28px 30px; box-shadow: 0 20px 70px rgba(0,0,0,.3); position: relative; }
.km-detail-close { position: absolute; top: 16px; right: 18px; font-size: 22px; background: none; border: none; cursor: pointer; color: var(--mute); }
.km-detail-close:hover { color: var(--text); }
.km-detail-word { font-size: 24px; font-weight: 800; line-height: 1.3; margin-bottom: 8px; padding-right: 30px; }
.km-detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.km-detail-ref { font-size: 11px; font-weight: 700; color: var(--c-trend); background: #fdeef2; padding: 4px 10px; border-radius: 6px; }
.km-detail-draft { font-size: 10px; font-weight: 800; padding: 4px 9px; border-radius: 6px; background: #fbe7a1; color: #7a5c00; text-transform: uppercase; }
.km-detail-memo { font-size: 14px; line-height: 1.7; color: var(--sub); margin-bottom: 16px; }
.km-detail-palette { display: flex; height: 40px; border-radius: 8px; overflow: hidden; margin-bottom: 18px; border: 1px solid var(--line); }
.km-detail-palette div { flex: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px; font-size: 8px; color: rgba(0,0,0,.45); font-weight: 700; }
.km-detail-srchead { font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--mute); margin-bottom: 10px; }
.km-detail-srcs { display: flex; flex-direction: column; gap: 14px; }
.km-detail-src { display: flex; gap: 14px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; padding: 10px; }
.km-detail-src-media { position: relative; width: 110px; height: 110px; flex-shrink: 0; border-radius: 8px; overflow: hidden; background: #ececec; cursor: pointer; }
.km-detail-src-media img { width: 100%; height: 100%; object-fit: cover; }
.km-detail-src-media .km-vidph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.km-detail-src-info { flex: 1; min-width: 0; }
.km-detail-src-title { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
.km-detail-src-body { font-size: 11.5px; color: var(--sub); line-height: 1.55; max-height: 64px; overflow: hidden; margin-bottom: 7px; }
.km-detail-src-links { display: flex; gap: 8px; flex-wrap: wrap; }
.km-detail-src-link { font-size: 11px; font-weight: 700; text-decoration: none; padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--line); color: var(--sub); }
.km-detail-src-link:hover { border-color: var(--text); color: var(--text); }
.km-detail-src-link.ig { background: linear-gradient(45deg,#f09433,#dc2743,#bc1888); color: #fff; border: none; }

/* video lightbox */
.km-lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 3000; display: none; align-items: center; justify-content: center; }
.km-lightbox.open { display: flex; }
.km-lightbox-close { position: absolute; top: 16px; right: 22px; font-size: 26px; color: #fff; background: none; border: none; cursor: pointer; z-index: 2; }
.km-lightbox-inner { display: flex; align-items: center; justify-content: center; }
.km-lightbox-inner video { max-width: 90vw; max-height: 86vh; border-radius: 10px; background: #000; }
.km-lightbox-inner iframe { width: min(90vw, 920px); height: min(86vh, 520px); border-radius: 10px; border: none; }
.km-lightbox-loading { color: #fff; font-size: 13px; }

/* ── Right pane ── */
.km-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.km-view-tabs { display: flex; padding: 0 18px; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; gap: 4px; }
.km-view-tab { padding: 13px 16px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--mute); border: none; background: none; border-bottom: 2px solid transparent; transition: all .15s; letter-spacing: .04em; }
.km-view-tab.active { color: var(--text); border-bottom-color: var(--text); }
.km-view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.km-view.active { display: flex; }

/* board sub-tabs (per project) */
.km-board-tabs { display: flex; align-items: center; gap: 4px; padding: 6px 18px 0; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; overflow-x: auto; }
.km-board-tabs::-webkit-scrollbar { display: none; }
.km-board-tab { padding: 9px 14px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--mute); border: none; background: none; border-radius: 8px 8px 0 0; transition: all .15s; letter-spacing: .03em; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.km-board-tab.active { color: var(--text); background: var(--bg); }
.km-board-tab .tabn { font-size: 10px; color: var(--mute); font-weight: 600; }
.km-board-tab-x { border: none; background: none; cursor: pointer; color: var(--mute); font-size: 13px; padding: 0 0 0 2px; }
.km-board-tab-x:hover { color: var(--c-trend); }
.km-board-newtab { padding: 8px 12px; font-size: 16px; color: var(--mute); border: none; background: none; cursor: pointer; flex-shrink: 0; }
.km-board-newtab:hover { color: var(--text); }

/* trend read header */
.km-trendread { padding: 12px 18px; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; display: none; }
.km-trendread.show { display: block; }
.km-trendread-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.km-trendread-label { font-size: 9px; font-weight: 800; color: var(--mute); letter-spacing: .08em; text-transform: uppercase; }
.km-palette { display: flex; height: 26px; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); min-width: 160px; }
.km-palette div { flex: 1; min-width: 18px; position: relative; }
.km-palette div:hover::after { content: attr(data-hex); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #111; color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; white-space: nowrap; margin-bottom: 3px; }
.km-trendread-kw { display: flex; flex-wrap: wrap; gap: 5px; }
.km-trendread-kw span { font-size: 11px; font-weight: 700; color: var(--sub); background: var(--bg); border-radius: 20px; padding: 3px 9px; }

/* board drop area */
.km-board-drop { flex: 1; overflow-y: auto; padding: 18px; position: relative; }
.km-board-drop::-webkit-scrollbar { width: 6px; }
.km-board-drop::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.km-board-drop.drag-over { background: #fff8f9; box-shadow: inset 0 0 0 3px var(--c-trend); }
.km-board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; align-items: start; }

.km-bcard { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); overflow: hidden; width: 100%; transition: box-shadow .2s, border-color .2s; }
.km-bcard:hover { box-shadow: 0 10px 30px rgba(0,0,0,.1); }
.km-bcard-imgwrap { position: relative; width: 100%; aspect-ratio: 3/2; overflow: hidden; background: var(--bg); }
.km-bcard-imgwrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.km-bcard-swatch { display: flex; height: 100%; }
.km-bcard-swatch div { flex: 1; }
.km-bcard-cat { position: absolute; top: 12px; left: 12px; font-size: 9px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; color: #fff; }
.km-bcard-del { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.9); border: none; cursor: pointer; font-size: 14px; color: #888; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.km-bcard-del:hover { background: var(--c-trend); color: #fff; }
.km-bcard-body { padding: 13px 15px 15px; }
.km-bcard-title { width: 100%; border: none; background: none; font-family: inherit; font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.4; outline: none; padding: 0; margin-bottom: 4px; resize: none; overflow: hidden; }
.km-bcard-title:focus { background: #fffbe6; border-radius: 4px; }
.km-bcard-memo { width: 100%; border: none; background: none; font-family: inherit; font-size: 12.5px; color: var(--sub); line-height: 1.55; outline: none; padding: 6px 0 0; resize: none; overflow: hidden; min-height: 20px; }
.km-bcard-memo:focus { background: #f6f6f6; border-radius: 4px; padding: 6px 8px; }
.km-bcard-memo::placeholder { color: var(--mute); font-style: italic; }
.km-bcard-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.km-bcard-catsel { font-size: 10px; font-weight: 700; border: 1.5px solid var(--line); border-radius: 6px; padding: 3px 6px; background: var(--bg); color: var(--sub); outline: none; cursor: pointer; }
.km-bcard-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.km-bcard-tag { font-size: 9.5px; padding: 2px 7px; background: var(--bg); border-radius: 20px; color: var(--sub); font-weight: 600; }
.km-bcard-link { font-size: 10px; color: var(--mute); margin-left: auto; text-decoration: none; }
.km-bcard-link:hover { color: var(--text); }

/* 実践Tips view */
.km-ai-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; padding: 18px; overflow-y: auto; align-content: start; }
.km-ai-card { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 16px 17px 15px; transition: box-shadow .2s, border-color .2s; }
.km-ai-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,.08); border-color: #c9c9c9; }
.km-ai-top { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
.km-ai-cat { font-size: 9px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; padding: 4px 9px; border-radius: 6px; color: #fff; background: var(--c-trend); }
.km-ai-tool { font-size: 10px; font-weight: 700; color: var(--sub); background: var(--bg); border: 1px solid var(--line); border-radius: 20px; padding: 3px 9px; }
.km-ai-date { font-size: 10px; color: var(--mute); margin-left: auto; }
.km-ai-title { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
.km-ai-key { display: flex; align-items: center; gap: 8px; background: #f3f1fb; border: 1px dashed var(--c-trend); border-radius: 8px; padding: 9px 11px; margin-bottom: 11px; cursor: pointer; transition: background .12s; }
.km-ai-key:hover { background: #ece8fa; }

<script>
// ── Config ──
const cfg = {
  get base()    { return localStorage.getItem('obsidian-rest-api-base') || 'http://127.0.0.1:27123'; },
  get key()     { return localStorage.getItem('obsidian-rest-api-key') || ''; },
  get index()   { return localStorage.getItem('ctl-index-path') || '00_🏢 company/cockpit-inspiration/map-index.json'; },
  get boards()  { return localStorage.getItem('ctl-boards-path') || '00_🏢 company/cockpit-inspiration/boards.json'; },
  get igDir()   { return localStorage.getItem('ctl-ig-dir') || '99_🖼️ picture/instagram'; },
  get ownDir()  { return localStorage.getItem('ctl-own-dir') || '99_🖼️ picture/own'; },
  get pnDir()   { return localStorage.getItem('ctl-pn-dir') || '20_📂 zettelkasten/PermanentNote'; },
  get litDir()  { return localStorage.getItem('ctl-lit-dir') || '20_📂 zettelkasten/LiteratureNote'; },
  get aiKnowhow() { return localStorage.getItem('ctl-aiknowhow-path') || '00_🏢 company/cockpit-inspiration/ai-knowhow.json'; },
};
function headers(extra = {}) { return { Authorization: `Bearer ${cfg.key}`, ...extra }; }
function enc(p) { return encodeURIComponent(p).replace(/%2F/g, '/'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Obsidian API ──
async function obsListDir(dir) {
  try { const r = await fetch(`${cfg.base}/vault/${enc(dir)}/`, { headers: headers({ Accept: 'application/json' }) });
    if (!r.ok) return []; const j = await r.json(); return j.files || []; } catch { return []; }
}
async function obsGetJSON(path) {
  try { const r = await fetch(`${cfg.base}/vault/${enc(path)}`, { headers: headers({ Accept: '*/*' }) });
    if (!r.ok) return null; return JSON.parse(await r.text()); } catch { return null; }
}
async function obsGet(path) {
  try { const r = await fetch(`${cfg.base}/vault/${enc(path)}`, { headers: headers({ Accept: 'text/markdown' }) });
    if (!r.ok) return null; return await r.text(); } catch { return null; }
}
// minimal YAML frontmatter parser (scalars + list fields tags/sources)
function parseFrontmatter(md) {
  const m = (md || '').match(/^---\n([\s\S]*?)\n---/);
  if (!m) return { _body: md || '' };
  const fm = {}; const lines = m[1].split('\n'); let key = null;
  for (const line of lines) {
    const li = line.match(/^([A-Za-z_][\w-]*):\s*(.*)$/);
    if (li) {
      key = li[1]; const v = li[2].trim();
      if (v === '') fm[key] = [];                 // list follows
      else if (/^\[.*\]$/.test(v)) fm[key] = v.slice(1, -1).split(',').map(s => s.trim().replace(/^["']|["']$/g, '')).filter(Boolean);
      else fm[key] = v.replace(/^["']|["']$/g, '');
    } else {
      const it = line.match(/^\s*-\s*(.+)$/);
      if (it && key) { if (!Array.isArray(fm[key])) fm[key] = []; fm[key].push(it[1].trim().replace(/^["']|["']$/g, '')); }
    }
  }
  fm._body = (md.slice(m[0].length) || '').trim();
  return fm;
}
async function obsPutJSON(path, data) {
  const r = await fetch(`${cfg.base}/vault/${enc(path)}`, { method: 'PUT', headers: headers({ 'Content-Type': 'application/json' }), body: JSON.stringify(data, null, 2) });
  if (!r.ok) throw new Error(`PUT ${path} → ${r.status}`);
}
async function obsPutBinary(path, blob) {
  const r = await fetch(`${cfg.base}/vault/${enc(path)}`, { method: 'PUT', headers: headers({ 'Content-Type': blob.type || 'application/octet-stream' }), body: blob });
  if (!r.ok) throw new Error(`PUT bin ${path} → ${r.status}`);
}
const _imgCache = new Map();
async function vaultImageURL(path) {
  if (_imgCache.has(path)) return _imgCache.get(path);
  try { const r = await fetch(`${cfg.base}/vault/${enc(path)}`, { headers: headers() });
    if (!r.ok) return null; const url = URL.createObjectURL(await r.blob()); _imgCache.set(path, url); return url; } catch { return null; }
}
// capture first frame of a vault video as a thumbnail dataURL (cached)
const _vthumbCache = new Map();
async function videoThumb(path) {
  if (_vthumbCache.has(path)) return _vthumbCache.get(path);
  const url = await vaultImageURL(path);
  if (!url) { _vthumbCache.set(path, null); return null; }
  const data = await new Promise(res => {
    const v = document.createElement('video');
    v.muted = true; v.playsInline = true; v.preload = 'metadata'; v.src = url;
    let done = false; const finish = (val) => { if (!done) { done = true; res(val); } };
    v.onloadeddata = () => { try { v.currentTime = Math.min(0.15, (v.duration || 1) / 2); } catch { finish(null); } };
    v.onseeked = () => { try { const c = document.createElement('canvas'); c.width = v.videoWidth || 320; c.height = v.videoHeight || 320; c.getContext('2d').drawImage(v, 0, 0, c.width, c.height); finish(c.toDataURL('image/jpeg', 0.72)); } catch { finish(null); } };
    v.onerror = () => finish(null);
    setTimeout(() => finish(null), 6000);
  });
  _vthumbCache.set(path, data);
  return data;
}

// ── State ──
const CAT = {
  trend: { label: 'TREND', color: '#e8365d', emoji: '✨' },
  brand: { label: 'BRAND', color: '#2563eb', emoji: '🏷' },
  place: { label: 'PLACE', color: '#16a34a', emoji: '📍' },
  food:  { label: 'FOOD',  color: '#d97706', emoji: '☕' },
  other: { label: 'OTHER', color: '#6b7280', emoji: '📌' },
};
function catColor(c) { return (CAT[c] || CAT.other).color; }
const IMG_EXT = /\.(jpe?g|png|webp|gif|avif)$/i;
const VIDEO_EXT = /\.(mp4|mov|webm|m4v)$/i;
const MEDIA_EXT = /\.(jpe?g|png|webp|gif|avif|mp4|mov|webm|m4v)$/i;
function isVid(p) { return VIDEO_EXT.test(p || ''); }

let mapIndex = [];
let pool = [];
let boardsData = { boards: {}, active: null };
let poolTagFilter = null;
let allCat = 'all';
let currentView = 'board';

// image source for a metadata entry
function entryImg(e) {
  if (e.image_url) return { imgUrl: e.image_url };
  if (e.shortcode) return { imgPath: `${cfg.igDir}/${e.shortcode}_1.jpg` };
  if (e.youtube_id) return { imgUrl: `https://img.youtube.com/vi/${e.youtube_id}/hqdefault.jpg` };
  return {};
}

// ── Load everything ──
async function loadAll() {
  mapIndex = (await obsGetJSON(cfg.index)) || [];
  boardsData = (await obsGetJSON(cfg.boards)) || { boards: {}, active: null };
  if (!boardsData.boards || typeof boardsData.boards !== 'object') boardsData = { boards: {}, active: null };
  if (!Object.keys(boardsData.boards).length) { boardsData.boards['BIGBANG'] = { name: 'BIGBANG', cards: [] }; boardsData.active = 'BIGBANG'; }
  if (!boardsData.active || !boardsData.boards[boardsData.active]) boardsData.active = Object.keys(boardsData.boards)[0];

  const byShort = {}; mapIndex.forEach(e => { if (e.shortcode) byShort[e.shortcode] = e; });
  const items = []; const seenShort = new Set();

  const igFiles = await obsListDir(cfg.igDir);
  igFiles.filter(f => MEDIA_EXT.test(f)).forEach(f => {
    const m = f.match(/^(.+?)_(\d+)\.[a-z0-9]+$/i);
    const short = m ? m[1] : f.replace(MEDIA_EXT, '');
    if (m && m[2] !== '1' && seenShort.has(short)) return;
    if (m && m[2] === '1') seenShort.add(short);
    const key = `ig:${short}`;
    if (items.some(it => it.id === key)) return;
    const meta = byShort[short] || {};
    const vid = VIDEO_EXT.test(f);
    items.push({ id: key, kind: 'ig', imgPath: vid ? null : `${cfg.igDir}/${f}`, videoPath: vid ? `${cfg.igDir}/${f}` : null, isVideo: vid, shortcode: short,
      title: meta.title || '', cardTitle: meta.card_title || meta.title || '',
      category: meta.category || 'trend', tags: meta.tags || [], memo: meta.memo || '',
      colors: meta.colors || [], mdPath: meta.path || null, created: meta.created || '', linked: !!byShort[short] });
  });

  const ownFiles = await obsListDir(cfg.ownDir);
  ownFiles.filter(f => MEDIA_EXT.test(f)).forEach(f => {
    const vid = VIDEO_EXT.test(f);
    items.push({ id: `own:${f}`, kind: 'own', imgPath: vid ? null : `${cfg.ownDir}/${f}`, videoPath: vid ? `${cfg.ownDir}/${f}` : null, isVideo: vid, shortcode: null,
      title: '', cardTitle: '', category: 'trend', tags: [], memo: '', colors: [], mdPath: null, created: f.slice(0, 13), linked: false, own: true });
  });

  mapIndex.forEach(e => {
    if (e.shortcode && items.some(it => it.shortcode === e.shortcode)) return;
    if (e.image_url || e.youtube_id || (e.colors && e.colors.length)) {
      const im = entryImg(e);
      items.push({ id: `meta:${e.path}`, kind: 'meta', imgUrl: im.imgUrl || '', imgPath: im.imgPath || null,
        youtubeId: e.youtube_id || null, shortcode: e.shortcode || null, title: e.title || '', cardTitle: e.card_title || e.title || '',
        category: e.category || 'trend', tags: e.tags || [], memo: e.memo || '', colors: e.colors || [],
        mdPath: e.path || null, created: e.created || '', linked: true });
    }
  });

  items.sort((a, b) => { if (a.own !== b.own) return a.own ? -1 : 1; if (a.linked !== b.linked) return a.linked ? -1 : 1; return (b.created || '').localeCompare(a.created || ''); });
  pool = items;
}

function activeBoard() { return boardsData.boards[boardsData.active]; }
function usedIds() { const b = activeBoard(); if (!b) return new Set(); return new Set(b.cards.map(c => c.poolId).filter(Boolean)); }

// ── Pool render ──
function renderPoolKeywords() {
  const freq = {}; pool.forEach(it => (it.tags || []).forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 16);
  const el = document.getElementById('pool-keywords');
  if (!sorted.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<span class="km-kw-label">🔥 今のキーワード</span>` +
    sorted.map(([t, n]) => `<button class="km-kw ${poolTagFilter === t ? 'on' : ''}" onclick="togglePoolTag('${escHtml(t)}')">#${escHtml(t)}<span class="n">${n}</span></button>`).join('') +
    (poolTagFilter ? `<button class="km-kw" style="border-color:#e8365d;color:#e8365d" onclick="togglePoolTag(null)">✕ 解除</button>` : '');
}
function togglePoolTag(t) { poolTagFilter = (poolTagFilter === t) ? null : t; renderPool(); }

// ── Video / player ──
function openPlayer(opts) {
  const lb = document.getElementById('km-lightbox'); const box = document.getElementById('km-lightbox-inner');
  box.innerHTML = '';
  if (opts.youtubeId) {
    box.innerHTML = `<iframe src="https://www.youtube.com/embed/${escHtml(opts.youtubeId)}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    lb.classList.add('open');
  } else if (opts.videoPath) {
    box.innerHTML = `<div class="km-lightbox-loading">動画を読み込み中...</div>`;
    lb.classList.add('open');
    vaultImageURL(opts.videoPath).then(u => {
      if (!lb.classList.contains('open')) return;
      if (u) { const v = document.createElement('video'); v.controls = true; v.autoplay = true; v.playsInline = true; v.src = u; box.innerHTML = ''; box.appendChild(v); }
      else box.innerHTML = `<div class="km-lightbox-loading">動画を読み込めなかった（API接続を確認してね）</div>`;
    });
  }
}
function playPool(id) { const it = pool.find(p => p.id === id); if (it) openPlayer({ videoPath: it.videoPath, youtubeId: it.youtubeId }); }
function closePlayer() { const lb = document.getElementById('km-lightbox'); lb.classList.remove('open'); document.getElementById('km-lightbox-inner').innerHTML = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

let _io = null;
function mediaInto(box, it) {
  let url = it.imgUrl || null;
  const finish = (u) => {
    if (u) { const img = new Image(); img.onload = () => { box.innerHTML = ''; box.appendChild(img); }; img.onerror = () => failBox(box, it); img.src = u; }
    else if (it.colors && it.colors.length) { box.innerHTML = `<div class="km-tile-swatch">${it.colors.map(c => `<div style="background:${c}"></div>`).join('')}</div>`; }
    else failBox(box, it);
  };
  if (url) finish(url);
  else if (it.imgPath) vaultImageURL(it.imgPath).then(u => finish(u));
  else finish(null);
}
function failBox(box, it) {
  if (it.colors && it.colors.length) { box.innerHTML = `<div class="km-tile-swatch">${it.colors.map(c => `<div style="background:${c}"></div>`).join('')}</div>`; }
  else { box.innerHTML = `<div class="km-tile-fail">🖼</div>`; }
}

function renderPool() {
  renderPoolKeywords();
  const q = (document.getElementById('pool-search').value || '').toLowerCase();
  let items = pool;
  if (poolTagFilter) items = items.filter(it => (it.tags || []).includes(poolTagFilter));
  if (q) items = items.filter(it => (it.title + ' ' + it.cardTitle + ' ' + (it.tags || []).join(' ') + ' ' + it.memo).toLowerCase().includes(q));
  document.getElementById('pool-count').textContent = `${items.length}枚`;
  const el = document.getElementById('pool-grid');
  if (!items.length) { el.innerHTML = `<div class="km-pool-empty">${pool.length ? '該当する素材がないよ' : 'まだ素材がないよ。<br>⬆ 写真を追加 か、インスタ保存画像を読み込むと<br>ここに並ぶよ'}</div>`; return; }
  const used = usedIds();
  el.innerHTML = items.map(it => {
    const isUsed = used.has(it.id);
    const cat = CAT[it.category] || CAT.other;
    const label = it.cardTitle || it.title || '';
    const overlay = label ? `<div class="km-tile-overlay">${escHtml(label)}</div>` : '';
    const badge = it.own ? `<span class="km-tile-raw">MY PHOTO</span>` : it.linked ? `<span class="km-tile-badge" style="background:${cat.color}">${cat.label}</span>` : `<span class="km-tile-raw">未整理</span>`;
    const corner = isUsed ? `<div class="km-tile-check">✓</div>` : `<button class="km-tile-add" onclick="event.stopPropagation();addToBoardById('${it.id}')" title="ボードに追加">+</button>`;
    const playBadge = (it.isVideo || it.youtubeId) ? `<div class="km-play-badge" onclick="event.stopPropagation();playPool('${it.id}')">▶</div>` : '';
    const reel = it.isVideo ? `<span class="km-tile-reel">REEL</span>` : (it.youtubeId ? `<span class="km-tile-reel">YOUTUBE</span>` : '');
    const media = it.isVideo ? `<div class="km-tile-media km-vidph"></div>` : `<div class="km-tile-media" data-media="${it.id}"><div class="km-tile-skeleton"></div></div>`;
    return `<div class="km-tile ${isUsed ? 'used' : ''}" draggable="true" data-id="${it.id}" ondragstart="onTileDragStart(event,'${it.id}')" ondragend="onTileDragEnd(event)" ondblclick="addToBoardById('${it.id}')">
      ${media}
      ${badge}${corner}${playBadge}${reel}${overlay}
    </div>`;
  }).join('');

  if (_io) _io.disconnect();
  _io = new IntersectionObserver((entries, obs) => {
    entries.forEach(ent => { if (!ent.isIntersecting) return; const box = ent.target; obs.unobserve(box);
      const it = pool.find(p => p.id === box.dataset.media); if (it) mediaInto(box, it); });
  }, { root: el, rootMargin: '300px' });
  el.querySelectorAll('.km-tile-media').forEach(b => _io.observe(b));
}

// ── Drag & drop ──
function onTileDragStart(e, id) { e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'copy'; e.currentTarget.classList.add('dragging'); }
function onTileDragEnd(e) { e.currentTarget.classList.remove('dragging'); }
function onBoardDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; document.getElementById('board-drop').classList.add('drag-over'); }
function onBoardDragLeave(e) { if (e.target.id === 'board-drop') document.getElementById('board-drop').classList.remove('drag-over'); }
function onBoardDrop(e) { e.preventDefault(); document.getElementById('board-drop').classList.remove('drag-over'); const id = e.dataTransfer.getData('text/plain'); if (id) addToBoardById(id); }

function addToBoardById(id) {
  const it = pool.find(p => p.id === id); if (!it) return;
  const b = activeBoard(); if (!b) { toast('先にボードを作ってね'); return; }
  if (b.cards.some(c => c.poolId === id)) { toast('もうこのボードにあるよ'); return; }
  b.cards.unshift({ cid: 'c' + Date.now() + Math.floor(Math.random() * 1000), poolId: id, imgPath: it.imgPath || null, imgUrl: it.imgUrl || null,
    videoPath: it.videoPath || null, isVideo: !!it.isVideo, youtubeId: it.youtubeId || null,
    colors: it.colors || [], title: it.cardTitle || it.title || '', category: it.category || 'trend', tags: it.tags || [], memo: '', mdPath: it.mdPath || null });
  saveBoards(); renderBoard(); renderPool(); if (currentView === 'all') renderAll();
  toast(it.cardTitle || it.title ? `「${(it.cardTitle || it.title).slice(0, 14)}」を追加` : 'ボードに追加したよ');
}
function addEntryToBoard(path) {
  const e = mapIndex.find(x => x.path === path); if (!e) return;
  const poolItem = pool.find(p => p.mdPath === path);
  if (poolItem) return addToBoardById(poolItem.id);
  const b = activeBoard(); if (!b) return;
  const im = entryImg(e);
  const evid = im.imgPath && VIDEO_EXT.test(im.imgPath);
  b.cards.unshift({ cid: 'c' + Date.now() + Math.floor(Math.random() * 1000), poolId: null, imgPath: evid ? null : (im.imgPath || null), imgUrl: im.imgUrl || null,
    videoPath: evid ? im.imgPath : null, isVideo: !!evid, youtubeId: e.youtube_id || null,
    colors: e.colors || [], title: e.card_title || e.title || '', category: e.category || 'trend', tags: e.tags || [], memo: '', mdPath: e.path || null });
  saveBoards(); renderBoard(); toast('★ ボードに追加したよ');
}
function removeCard(cid) { const b = activeBoard(); if (!b) return; b.cards = b.cards.filter(c => c.cid !== cid); saveBoards(); renderBoard(); renderPool(); }
function updateCard(cid, field, value) { const b = activeBoard(); if (!b) return; const c = b.cards.find(x => x.cid === cid); if (!c) return; c[field] = value; saveBoards(); if (field === 'category') renderBoard(); }

// ── Board render ──
function renderBoardTabs() {
  const el = document.getElementById('board-tabs');
  el.innerHTML = Object.keys(boardsData.boards).map(n => {
    const b = boardsData.boards[n]; const active = n === boardsData.active;
    return `<button class="km-board-tab ${active ? 'active' : ''}" onclick="switchBoard('${escHtml(n)}')">${escHtml(n)} <span class="tabn">${b.cards.length}</span>${active ? `<span class="km-board-tab-x" onclick="event.stopPropagation();deleteBoard('${escHtml(n)}')" title="削除">✕</span>` : ''}</button>`;
  }).join('') + `<button class="km-board-newtab" onclick="newBoard()" title="新規ボード">＋</button>`;
}
function renderTrendRead() {
  const b = activeBoard(); const el = document.getElementById('trendread');
  if (!b || !b.cards.length) { el.classList.remove('show'); el.innerHTML = ''; return; }
  const colors = []; b.cards.forEach(c => (c.colors || []).forEach(x => { if (!colors.includes(x)) colors.push(x); }));
  const freq = {}; b.cards.forEach(c => (c.tags || []).forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
  const kw = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8);

let trendCards = [];
let trendsLoaded = false;

async function loadTrends() {
  trendsLoaded = true;
  const files = (await obsListDir(cfg.pnDir)).filter(f => f.endsWith('.md'));
  const cards = [];
  await Promise.allSettled(files.map(async f => {
    const md = await obsGet(`${cfg.pnDir}/${f}`);
    if (!md) return;
    const fm = parseFrontmatter(md);
    const tags = fm.tags || [];
    if (!tags.includes('trend-card')) return;
    // 補足 section body (strip headings)
    let memo = (fm._body || '').replace(/^#+\s.*$/gm, '').replace(/^\s*>.*$/gm, '').replace(/\[\[[^\]]*\]\]/g, '').replace(/\n{2,}/g, '\n').trim().slice(0, 220);
    const sources = (fm.sources || []).map(s => s.replace(/^\[\[|\]\]$/g, '').split('|')[0].trim());
    cards.push({
      word: fm.trend || f.replace(/\.md$/, ''), file: f,
      draft: fm.status === 'ai-draft', memo, sources,
      images: fm.images || [],
      palette: fm.colors || [],
      tags: tags.filter(t => t !== 'trend-card'),
      cats: Array.isArray(fm.cats) ? fm.cats : null,
      trendRef: fm.trend_ref || '',
    });
  }));
  cards.sort((a, b) => (a.draft === b.draft) ? a.word.localeCompare(b.word) : (a.draft ? -1 : 1));

  // sources から画像を解決（images が空のカード向け）
  const needResolve = cards.filter(c => (!c.images || !c.images.length) && c.sources.length);
  if (needResolve.length) {
    const stripWL = s => s.replace(/^\[\[/, '').replace(/\]\]$/, '');
    const allSrcNames = [...new Set(needResolve.flatMap(c => c.sources.map(stripWL)))];
    const srcImgMap = {};
    await Promise.allSettled(allSrcNames.map(async name => {
      const md = await obsGet(`${cfg.litDir}/${name}.md`).catch(() => null);
      if (!md) return;
      const fm2 = parseFrontmatter(md);
      const imgs = extractImgPaths(fm2, md, cfg.igDir);
      if (imgs.length) srcImgMap[name] = imgs[0];
    }));
    for (const c of needResolve) {
      const resolved = c.sources.map(s => srcImgMap[stripWL(s)]).filter(Boolean);
      if (resolved.length) c.images = resolved;
    }
  }

  trendCards = cards;
}

let trendSub = 'all';

// トレンドのサブカテゴリ。all=全部、fashion/goods=用途軸（重ね掛け）、color〜style=デザイン要素軸（排他・czCat）
const TCATS = { all: '🌐 すべて', fashion: '👗 ファッション', goods: '🎁 グッズ', ai: '🤖 AI制作', color: '🎨 カラー', material: '🫧 素材・質感', motif: '✦ モチーフ・グラフィック', style: '🖐 スタイル・手法' };
// 用途軸（キーワード自動判定・1枚が色軸とファッション/グッズ/AIに両方所属しうる）
function isFashion(word, tags, memo) {
  const s = `${word || ''} ${(tags || []).join(' ')} ${memo || ''}`.toLowerCase();
  return /fashion|apparel|gorpcore|utilitarian|clean-girl|graphic-tee|western-girly|diy-fashion|editorial-flatlay|editorial-layout|photo-led|photodump|quiet-age|surf|retro-rock|y-culture|aura-photography|naif|26ss|26aw|コーデ|着こなし|tシャツ|ニット|デニム|トップス|ウェア|スタイリング|ファッション|ユーティリタリアン/.test(s);
}
function isGoods(word, tags, memo) {
  const s = `${word || ''} ${(tags || []).join(' ')} ${memo || ''}`.toLowerCase();
  return /goods|package|cosmetic|metallic-package|space-concept|product|stationery|accessor|グッズ|パッケージ|コスメ|プロダクト|雑貨|アクセ|バッグ|シール|ステッカー|缶バ|キーホルダー|文具|ステーショナリー/.test(s);
}
function isAI(word, tags, memo) {
  const s = `${word || ''} ${(tags || []).join(' ')} ${memo || ''}`.toLowerCase();
  if (/ai生成|生成ai|画像生成|aiビジュアル|aiルック|aiアート|aiグラフィック|aiファッション|aiデザイン|ai広告|ai×手|ai二刀流|二刀流|midjourney|firefly|stable.diffusion|nano.banana|sketch.to.render|3dプリント|3d print|chatgpt|dall.e|dall-e|sora|runway|kling|seedance|comfyui|controlnet|ai-tool|ai-workflow|aiツール|aiワークフロー|ai活用|text-to-image|text2image|img2img|generative-ai/.test(s)) return true;
  return (tags||[]).some(t => /^ai[-_]|[-_]ai$|^genai$|^generative/.test(t.toLowerCase()));
}
function czCat(word, tags) {
  const t = (tags || []).join(' ');
  if (/素材|ジェリー/.test(word) || /material|jelly|translucent/.test(t)) return 'material';
  if (/color-trend|color-palette|color|pastel|burgundy|mint|lavender|terracotta|yellow|melon|sand|earth/.test(t)) return 'color';
  if (/カラー|配色|イエロー|ミント|ラベンダー|テラコッタ|バーガンディ|ターコイズ|メロン|ライム|ブルー|アース|伝統色|クラウドダンサー/.test(word)) return 'color';
  if (/記号|スター|メタル文字|宇宙|レトロフューチャー|シジリズム|クローバー/.test(word)) return 'motif';
  return 'style';
}
function czFmt(d) { const p = d.split('-'); return `${+p[1]}/${+p[2]}`; }
async function czLoadDates() {
  if (czDates) return;

    const n = media.length;

  });

function scFromNote(fm, basename) {
  const u = fm.url || '';
  let m = u.match(/instagram\.com\/(?:p|reel|tv)\/([\w-]+)/);
  if (m) return m[1];
  m = basename.match(/^IG_([A-Za-z0-9_-]{8,})/);
  return m ? m[1] : null;
}

function pushTrendToBoard(ci) {
  const c = trendCards[ci]; if (!c) return;
  const b = activeBoard(); if (!b) { toast('先にボードを作ってね'); return; }
  let added = 0;
  const media = (c.images && c.images.length) ? c.images : [];
  if (media.length) {
    media.forEach(path => {
      const pid = 'trend:' + path;
      if (b.cards.some(x => x.poolId === pid)) return;
      const vid = /\.(mp4|mov|webm|m4v)$/i.test(path);
      b.cards.unshift({ cid: 'c' + Date.now() + Math.floor(Math.random() * 100000), poolId: pid,
        imgPath: vid ? null : path, imgUrl: null, videoPath: vid ? path : null, isVideo: vid, youtubeId: null,
        colors: [], title: c.word, category: 'trend', tags: ['#' + c.word], memo: '', mdPath: null });
      added++;
    });
  } else {
    c.sources.forEach(s => { const it = sourcePoolItem(s); if (it && !b.cards.some(x => x.poolId === it.id)) { addToBoardSilent(it, c.word); added++; } });
  }
  saveBoards(); renderBoard(); renderPool();
  toast(added ? `「${c.word}」から${added}件を ${boardsData.active} に追加` : 'すでに全部ボードにあるよ');
}
function addToBoardSilent(it, trendWord) {

    videoPath: it.videoPath || null, isVideo: !!it.isVideo, youtubeId: it.youtubeId || null,
    colors: it.colors || [], title: it.cardTitle || it.title || '', category: it.category || 'trend', tags: (it.tags || []).concat(trendWord ? ['#' + trendWord] : []).slice(0, 6), memo: '', mdPath: it.mdPath || null });
}

function detectArtistName(fm, filename, body) {
  if (fm.artist && typeof fm.artist === 'string' && fm.artist.trim()) return fm.artist.trim();
  if (fm.category === 'artist-analysis') {
    const n = (fm.title || filename.replace(/\.md$/,'')).replace(/\s*アーティスト分析\s*$/,'').trim();
    return n || null;
  }
  if (fm.username && KNOWN_ARTISTS.username[fm.username]) return KNOWN_ARTISTS.username[fm.username];
  if (fm.author) { const au = (fm.author||'').replace(/^@/,''); if (KNOWN_ARTISTS.username[au]) return KNOWN_ARTISTS.username[au]; }
  // check client field (for project hub MDs)
  if (fm.client) { const cl = KNOWN_ARTISTS.client[fm.client] || KNOWN_ARTISTS.client[(fm.client||'').toLowerCase()]; if (cl) return cl; }
  const tags = Array.isArray(fm.tags) ? fm.tags : [];
  for (const t of tags) { const m = KNOWN_ARTISTS.tag[t.toLowerCase()]; if (m) return m; }
  // parse "Artist: NAME" from caption/body
  const cm = (body||'').match(/Artist:\s*([A-Za-z][^\n@]{2,30}?)[\n@]/);
  if (cm) return cm[1].trim();
  return null;
}
function extractImgPaths(fm, body, igDir) {
  const paths = [];
  if (Array.isArray(fm.images)) { for (const p of fm.images) if (IMG_EXT.test(p)) { paths.push(p); break; } }
  const sc = fm.shortcode || (() => {
    const u = fm.url || ''; const m = u.match(/instagram\.com\/(?:p|reel)\/([A-Za-z0-9_-]+)/); return m ? m[1] : null;
  })();
  if (sc) { paths.push(`${igDir}/${sc}_1.jpg`); paths.push(`${igDir}/${sc}.jpg`); paths.push(`${igDir}/${sc}_1_thumb.jpg`); }
  const bm = [...(body||'').matchAll(/!\[\[([^\]]+\.(jpe?g|png|webp|gif|avif))\]\]/gi)];
  for (const m of bm.slice(0,3)) paths.push(m[1]);
  return [...new Set(paths)];
}

async function loadBrands() {
  brandsLoaded = true;
  const files = (await obsListDir(cfg.litDir)).filter(f => f.endsWith('.md'));
  const cards = [];
  await Promise.allSettled(files.map(async f => {
    const md = await obsGet(`${cfg.litDir}/${f}`);
    const fm = parseFrontmatter(md);
    const isBrand = fm.category === 'brand-analysis'
      || (Array.isArray(fm.tags) && fm.tags.includes('brand-analysis'))
      || /ブランド分析/.test(f);
    if (!isBrand) return;
    const name = fm.title ? fm.title.replace(/\s*ブランド分析\s*$/, '').trim() : f.replace(/\.md$/, '').replace(/^[🏷️\s]+/, '').replace(/\s*ブランド分析\s*$/, '').trim();
    const genres = (Array.isArray(fm.tags) ? fm.tags : []).filter(t => t !== 'cd-library' && t !== 'brand-analysis').slice(0, 4);
    const source = fm.source || null;
    let imgPaths = extractImgPaths(fm, md, cfg.igDir);
    let htmlVaultPath = null;
    // local HTML analysis page → extract first brand image + prepare HTML link
    const isLocalHtml = source && !source.startsWith('http') && source.includes('.html');
    if (isLocalHtml) {
      htmlVaultPath = `00_🏢 company/secretary/notes/${source.replace(/^secretary\/notes\//, '')}`;
    }
    if (!imgPaths.length && htmlVaultPath) {
      try {
        const r = await fetch(`${cfg.base}/vault/${enc(htmlVaultPath)}`, { headers: headers({ Accept: '*/*' }) });
        if (r.ok) {
          const htmlContent = await r.text();
          const m = htmlContent.match(/src="(brand-images\/[^"]+)"/);
          if (m) imgPaths = [`00_🏢 company/secretary/notes/${m[1]}`];
        }
      } catch(e) {}
    }
    const mdPath = `${cfg.litDir}/${f}`;
    cards.push({ name, genres, date: fm.created || fm.date || '', source, imgPaths, mdPath, htmlVaultPath });
  }));
  brandCards = cards.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
}

  // Scan LiteratureNote/
  const litFiles = (await obsListDir(cfg.litDir)).filter(f => f.endsWith('.md'));
  await Promise.allSettled(litFiles.map(async f => {
    const md = await obsGet(`${cfg.litDir}/${f}`);
    if (!md) return;
    const fm = parseFrontmatter(md);
    const isArtist = fm.category === 'artist-analysis'
      || /アーティスト分析/.test(f)
      || (Array.isArray(fm.tags) && fm.tags.some(t => ARTIST_TAGS_DETECT.includes(t.toLowerCase())));
    if (!isArtist) return;
    const artistName = detectArtistName(fm, f, md) || 'その他';
    const genres = (Array.isArray(fm.tags) ? fm.tags : []).filter(t => !['instagram','artist-analysis','kpop','k-pop','idol'].includes(t.toLowerCase())).slice(0, 4);
    const mdPath = `${cfg.litDir}/${f}`;
    const imgPaths = extractImgPaths(fm, md, cfg.igDir);
    const memo = md.replace(/^---[\s\S]*?---/, '').replace(/!\[\[[^\]]*\]\]/g,'').replace(/^#+\s.*$/gm,'').replace(/\[\[[^\]]*\]\]/g,'').trim().slice(0, 80);
    const isAnalysisPage = fm.category === 'artist-analysis' || /アーティスト分析/.test(f);
    allCards.push({
      name: fm.title || f.replace(/\.md$/, '').replace(/^[🎤\s]+/, '').replace(/\s*アーティスト分析\s*$/, '').trim(),
      artistName, genres, date: fm.created || fm.date || '',
      source: fm.source || null, htmlFile: fm.html_file || null,
      imgPaths, mdPath, memo, isAnalysisPage,
    });
  }));

  // Also scan secretary/outputs/ for ip-brief + artist-tagged notes
  const outDir = '00_🏢 company/secretary/outputs';
  try {
    const outFiles = (await obsListDir(outDir)).filter(f => f.endsWith('.md'));
    await Promise.allSettled(outFiles.map(async f => {
      const md = await obsGet(`${outDir}/${f}`);
      if (!md) return;
      const fm = parseFrontmatter(md);
      const tags = Array.isArray(fm.tags) ? fm.tags : [];
      const isArtist = tags.includes('ip-brief') || fm.artist
        || tags.some(t => ARTIST_TAGS_DETECT.includes(t.toLowerCase()));
      if (!isArtist) return;
      const artistName = detectArtistName(fm, f, md);
      if (!artistName) return;
      const genres = tags.filter(t => !['output','ip-brief','KONNEKTED'].includes(t)).slice(0, 4);
      allCards.push({
        name: fm.title || f.replace(/\.md$/, '').replace(/\d{4}-\d{2}-\d{2}_/, '').trim(),
        artistName, genres, date: fm.date || fm.created || '',
        source: fm.source || null, htmlFile: fm.html_file || null,
        imgPaths: [], mdPath: `${outDir}/${f}`, memo: '', isAnalysisPage: true,
      });
    }));
  } catch(e) { /* ok if outputs dir empty */ }

  // Scan projects/ hub MDs (type: project + known artist client/tag)
  const projBase = '00_🏢 company/projects';
  try {
    const projTopItems = (await obsListDir(projBase))
      .map(d => d.replace(/\/$/, ''))
      .filter(d => d && !d.endsWith('.md') && !d.startsWith('_') && d !== '終了した案件');
    await Promise.allSettled(projTopItems.map(async topDir => {
      const subItems = await obsListDir(`${projBase}/${topDir}`).catch(() => []);
      // collect MDs at this level
      const mdsHere = subItems.filter(f => f.endsWith('.md'));
      // collect sub-subdirs (e.g. projects/kemio/20260310_抹茶/)
      const subDirs = subItems.filter(d => !d.endsWith('.md') && !d.startsWith('_')).map(d => d.replace(/\/$/, ''));
      const subSubMds = (await Promise.all(subDirs.map(sd =>
        obsListDir(`${projBase}/${topDir}/${sd}`).then(items =>
          items.filter(f => f.endsWith('.md')).map(f => `${topDir}/${sd}/${f}`)
        ).catch(() => [])
      ))).flat();
      const allMdPaths = [
        ...mdsHere.map(f => `${topDir}/${f}`),
        ...subSubMds,
      ];
      await Promise.allSettled(allMdPaths.map(async rel => {
        const path = `${projBase}/${rel}`;
        const md = await obsGet(path).catch(() => null);
        if (!md) return;
        const fm = parseFrontmatter(md);
        if (fm.type !== 'project') return;
        const artistName = detectArtistName(fm, rel.split('/').pop(), md);
        if (!artistName) return;
        const tags = Array.isArray(fm.tags) ? fm.tags : [];
        const genres = tags.filter(t => !['project-board','project'].includes(t.toLowerCase())).slice(0, 4);
        const title = fm.案件 || fm.title || rel.split('/').pop().replace(/\.md$/, '');
        allCards.push({
          name: title,
          artistName, genres, date: fm.start || fm.created || fm.date || '',
          source: null, htmlFile: null,
          imgPaths: [], mdPath: path, memo: '', isAnalysisPage: true,
        });
      }));
    }));
  } catch(e) { /* ok */ }

  // Group by artistName
  const grouped = {};
  for (const c of allCards) {
    const key = c.artistName || 'その他';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(c);
  }
  artistCards = grouped;
}

async function renderArtists() {
  const grid = document.getElementById('artist-grid');
  const head = document.getElementById('artist-head');
  if (!artistsLoaded) { grid.innerHTML = `<div class="km-trend-empty">読み込み中...</div>`; await loadArtists(); }
  const totalCards = Object.values(artistCards).flat().length;
  head.textContent = `${Object.keys(artistCards).length} アーティスト / ${totalCards} 件`;
  if (!totalCards) {
    grid.innerHTML = `<div class="km-trend-empty">アーティスト関連ノートがまだないよ。<br>LiteratureNote に K-POP タグや <code>category: artist-analysis</code> を追加すると自動表示される 🎤</div>`; return;
  }
  const ART_COLORS = ['#1d4ed8','#7c3aed','#db2777','#059669','#d97706','#dc2626','#0891b2','#b45309'];
  const sortedGroups = Object.entries(artistCards).sort(([a],[b]) => {
    if (a === 'その他') return 1; if (b === 'その他') return -1;
    return a.localeCompare(b, 'ja');
  });
  grid.innerHTML = sortedGroups.map(([artistName, cards]) => {
    const ci = [...(artistName||'')].reduce((h,ch)=>(h*31+ch.charCodeAt(0))&0xfffffff,0) % ART_COLORS.length;
    const cardsHtml = cards.map(c => {
      const chips = c.genres.map(g => `<span class="km-mc-tag">${escHtml(g)}</span>`).join('');
      const obsLink = `obsidian://open?vault=corin&file=${encodeURIComponent((c.mdPath||'').replace(/\.md$/,''))}`;
      const href = c.htmlFile || (c.source && /^https?:/.test(c.source) ? c.source : obsLink);
      const badge = c.isAnalysisPage ? `<div class="km-artist-analysis-badge">分析</div>` : '';
      const hasImgs = c.imgPaths && c.imgPaths.length;
      const imgAttr = hasImgs ? ` data-artist-imgpaths="${escHtml(JSON.stringify(c.imgPaths))}"` : '';
      const noImg = `<div class="km-mc-noimg" style="background:${ART_COLORS[ci]}"><div class="km-mc-noimg-emoji">🎤</div></div>`;
      const thumb = hasImgs
        ? `<div class="km-mc-thumb"${imgAttr}><div class="km-tile-skeleton"></div><img alt="" style="display:none">${badge}</div>`
        : `<div class="km-mc-thumb">${noImg}${badge}</div>`;
      const subEl = c.memo ? `<div class="km-mc-sub">${escHtml(c.memo)}</div>` : '';
      return `<a class="km-mc" href="${escHtml(href)}" target="_blank" rel="noopener">${thumb}<div class="km-mc-body"><div class="km-mc-title">${escHtml(c.name)}</div>${subEl}<div class="km-mc-tags">${chips}</div><div class="km-mc-foot"><span class="km-mc-date">${escHtml(c.date)}</span></div></div></a>`;
    }).join('');
    return `<div class="km-artist-group"><div class="km-artist-group-header"><span class="km-artist-group-name">🎤 ${escHtml(artistName)}</span><span class="km-artist-group-count">${cards.length} 件</span></div><div class="km-artist-group-cards">${cardsHtml}</div></div>`;
  }).join('');

  // Async multi-path image loading
  grid.querySelectorAll('[data-artist-imgpaths]').forEach(async thumbDiv => {
    const paths = JSON.parse(thumbDiv.dataset.artistImgpaths);
    const img = thumbDiv.querySelector('img');
    if (!img) return;
    for (const p of paths) {
      const u = await vaultImageURL(p);
      if (u) { img.src = u; img.style.display = ''; const sk = thumbDiv.querySelector('.km-tile-skeleton'); if (sk) sk.remove(); break; }
    }
  });
}

let evCards = [], eventsLoaded = false;
const EV_TAGS = new Set(['popup', 'popup-store', 'pop-up', 'ポップアップ', 'イベント告知', 'event', 'exhibition']);

function isEventNote(fm, fname) {
  if (Array.isArray(fm.tags) && fm.tags.some(t => EV_TAGS.has(t))) return true;
  return /ポップアップ|popup|pop.?up/i.test(fname);
}

async function loadEvents() {
  eventsLoaded = true;
  if (!brandsLoaded) await loadBrands();
  const files = (await obsListDir(cfg.litDir)).filter(f => f.endsWith('.md'));
  const cards = [];
  await Promise.allSettled(files.map(async f => {
    const md = await obsGet(`${cfg.litDir}/${f}`);
    const fm = parseFrontmatter(md);
    if (!isEventNote(fm, f)) return;
    const imgPath = Array.isArray(fm.images) && fm.images[0] ? fm.images[0] : null;
    const uname = (fm.username || fm.title || f.replace(/\.md$/, '')).replace(/_?(official|jp|japan)$/i, '');
    const zone = fm.map_zone || (Array.isArray(fm.tags) && fm.tags.find(t => /表参道|渋谷|原宿|梅田|銀座|新宿|青山|六本木|名古屋|大阪/.test(t))) || '';
    const hasBrand = brandCards.some(b => b.name.toLowerCase() === uname.toLowerCase());
    cards.push({ imgPath, imgUrl: null, uname, zone, date: fm.date || '', hasBrand });
  }));
  evCards = cards.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

async function renderEvents() {
  const grid = document.getElementById('events-grid');
  const head = document.getElementById('events-head');
  if (!eventsLoaded) { grid.innerHTML = `<div class="km-trend-empty">読み込み中...</div>`; await loadEvents(); }
  head.textContent = `${evCards.length} イベント`;
  if (!evCards.length) {
    grid.innerHTML = `<div class="km-trend-empty">まだ保存されていないよ。<br>IGでポップアップ投稿を保存すると自動で出てくる 🎪</div>`; return;
  }
  grid.innerHTML = evCards.map((c, i) => {
    const zoneEl = c.zone ? `<div class="km-mc-sub">📍 ${escHtml(c.zone)}</div>` : '';
    const brandBtn = c.hasBrand ? `<span class="km-mc-link" style="cursor:pointer" onclick="event.preventDefault();switchView('brand')">🏷 分析</span>` : '';
    const noImg = `<div class="km-mc-noimg" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"><div class="km-mc-noimg-emoji">🎪</div></div>`;
    const thumb = `<div class="km-mc-thumb" id="ev-mc-${i}">${noImg}</div>`;
    return `<div class="km-mc">${thumb}<div class="km-mc-body"><div class="km-mc-title">${escHtml(c.uname)}</div>${zoneEl}<div class="km-mc-foot"><span class="km-mc-date">${escHtml(c.date)}</span>${brandBtn}</div></div></div>`;
  }).join('');
  evCards.forEach(async (c, i) => {
    if (!c.imgPath && !c.imgUrl) return;
    const url = c.imgUrl || await vaultImageURL(c.imgPath);

// ── Font view ──
// ファイル名パターンで検出（tags/categoryに統一キーなし）
let fontCards = [], fontsLoaded = false;

function isFontNote(f) {
  return /font|フォント|typeface|タイポグラフィ|タイポ|typography/i.test(f);
}

async function loadFonts() {
  fontsLoaded = true;
  const files = (await obsListDir(cfg.litDir)).filter(f => f.endsWith('.md'));
  const cards = [];
  await Promise.allSettled(files.map(async f => {
    if (!isFontNote(f)) return;
    const md = await obsGet(`${cfg.litDir}/${f}`);
    const fm = parseFrontmatter(md);
    const title = fm.title || f.replace(/\.md$/, '');
    const tags = (Array.isArray(fm.tags) ? fm.tags : []).filter(t => t !== 'tutorial').slice(0, 4);
    // derive image path: images[] > shortcode > url extraction > body wiki-link
    let imgPath = Array.isArray(fm.images) && fm.images.find(p => /\.(jpe?g|png|webp|gif)$/i.test(p));
    if (!imgPath && fm.url) {
      const scm = fm.url.match(/instagram\.com\/(?:p|reel)\/([A-Za-z0-9_-]+)/);
      if (scm) imgPath = `${cfg.igDir}/${scm[1]}_1.jpg`;
    }
    if (!imgPath && fm.shortcode) imgPath = `${cfg.igDir}/${fm.shortcode}_1.jpg`;
    if (!imgPath) {
      const bodyMatch = md.match(/!\[\[([^\]]+\.(?:jpe?g|png|webp|gif))/i);
      if (bodyMatch) imgPath = bodyMatch[1];
    }
    cards.push({ title, tags, date: fm.date || fm.created || '', imgPath: imgPath || null });
  }));
  fontCards = cards.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
}

async function renderFonts() {
  const grid = document.getElementById('font-grid');
  const head = document.getElementById('font-head');
  if (!fontsLoaded) { grid.innerHTML = `<div class="km-trend-empty">読み込み中...</div>`; await loadFonts(); }
  head.textContent = `${fontCards.length} フォント・タイポグラフィノート`;
  if (!fontCards.length) {
    grid.innerHTML = `<div class="km-trend-empty">フォント関連ノートがまだないよ。<br>ファイル名に「フォント」「font」「typeface」「タイポ」を含めると自動で出てくる 🔤</div>`; return;
  }
  grid.innerHTML = fontCards.map((c, i) => {
    const chips = c.tags.map(g => `<span class="km-mc-tag">${escHtml(g)}</span>`).join('');
    const noImg = `<div class="km-mc-noimg" style="background:#111"><div class="km-mc-noimg-emoji" style="font-size:52px;color:#fff;opacity:.7;font-style:italic;font-weight:900">A</div><div class="km-mc-noimg-label">typeface</div></div>`;
    const thumb = c.imgPath
      ? `<div class="km-mc-thumb"><div class="km-tile-skeleton"></div><img data-font-img="${escHtml(c.imgPath)}" alt="" style="display:none"></div>`
      : `<div class="km-mc-thumb">${noImg}</div>`;
    return `<div class="km-mc">${thumb}<div class="km-mc-body"><div class="km-mc-title">${escHtml(c.title)}</div><div class="km-mc-tags">${chips}</div><div class="km-mc-foot"><span class="km-mc-date">${escHtml(c.date)}</span></div></div></div>`;
  }).join('');
  grid.querySelectorAll('img[data-font-img]').forEach(async img => {
    const u = await vaultImageURL(img.dataset.fontImg);
    if (u) { img.src = u; img.style.display = ''; const sk = img.previousElementSibling; if (sk?.classList.contains('km-tile-skeleton')) sk.remove(); }
  });
}

  "サイバーシジリズム": { prevPeak: "1990年代後半〜2000年代前半（ネオトライバルタトゥー全盛期）", prevPeakYear: "1995–2005", prevPeakPct: 75, currPct: 80, whyNow: "Z世代が「クリーンガール」「ミニマリズム」への反動として暗くカオスなマキシマリズムを選んでいる。コロナ禍の閉塞感・経済不安がY2K的な過剰美学と共鳴。TikTokでタトゥー動画が拡散し、デジタル自己とリアル身体の統合願望がグラフィックへ昇華。", evolution: "前回（1990s）は太い黒ベタ・部族の形式模倣・トライバルバンドが主流で「デコレーション」として消費。現代版は極細ラインワーク・カオスマジックのシジル・バイオメカニカル要素・Y2Kゲーム的デジタル回路感を融合し、精緻な線が特徴。", timeline: [{ year: "1995–2005", event: "トライバルタトゥーが大衆文化に爆発的普及。腰骨・二の腕バンドのイメージが定着しその後「ダサい」レッテルで下火に" }, { year: "2018", event: "LA拠点タトゥーアーティストA.i.（@cybersigilism）がスタイルを確立。ベルリンのテクノ地下クラブシーンで広まる" }, { year: "2020–2022", event: "コロナ禍でTikTok拡散が加速。スウェーデン音楽コレクティブDrain Gang（Bladee等）が視覚言語を世界に発信" }, { year: "2023", event: "Billie Eilish・Grimes・Playboi CartiがタトゥーGRに採用。VetementsやBalenciagaがランウェイでラインワークを取り入れ高ファッション化" }, { year: "2024–2026", event: "Minga Londonなど量産ファッションブランドがサイバーシジリズム専用コレクション展開。TikTok#CyberSigilismが数千万再生に到達" }], keyPlayers: "A.i.（@cybersigilism・命名者）・Noel Garcia / Billie Eilish・Grimes・Playboi Carti・Drain Gang / Vetements・Balenciaga・Minga London / 032c magazine" },
  "クラウドダンサー": { prevPeak: "1990年代後半〜2000年代初頭", prevPeakYear: "1995–2003", prevPeakPct: 68, currPct: 92, whyNow: "SNS過剰刺激・デジタルファティーグへの反動として「静寂・余白・ミニマル」への回帰が起きている。クワイエット・ラグジュアリーが2022〜2023年に社会的トレンドとして定着し、その帰着先として「色を足さない白」という選択が2025〜2026年に昇華。Pantone史上初の白選出（PANTONE 11-4201）がそれを象徴する。", evolution: "1990年代のミニマリズムは「装飾の排除＝モダン」という造形的主張だったが、2026年のクラウドダンサーは「刺激からの撤退・内省・心理的安全」という感情的・社会的メッセージを帯びる。「白＝清潔・ゼロ」から「白＝豊かな余白・意思ある選択」へ意味が変容。", timeline: [{ year: "1995–2003", event: "Calvin Klein・Helmut Lang・Jil Sanderが牽引する90年代ミニマリズムのピーク。白・ベージュ・グレーの無彩色パレットがランウェイを席巻" }, { year: "2022–2023", event: "クワイエット・ラグジュアリーがVogueの「2023年5大トレンド」入り。クリーム・タウプ・ストーンなどニュートラルカラーが再浮上" }, { year: "2024–2025", event: "春夏パリ＆ミラノコレクションでオールホワイトルックが多数登場。SNSのクリーンエステティックが視覚言語として定着" }, { year: "2025年12月", event: "PantoneがCloud Dancer（11-4201）を2026年カラー・オブ・ザ・イヤーに発表。Pantone史上初の白系選出" }], keyPlayers: "Calvin Klein（1990年代の原点）・The Row・Jil Sander・Toteme・Loro Piana / Helmut Lang・Raf Simons・Mary-Kate＆Ashley Olsen / Pantone Color Institute" },
  "オールホワイトコーデ": { prevPeak: "1990年代後半〜2010年代中盤（ミニマリズム第一波・セリーヌ時代）", prevPeakYear: "1995–2017", prevPeakPct: 72, currPct: 89, whyNow: "2022年以降の「クワイエットラグジュアリー」が下地を作り、パントーン2026年カラー・オブ・ザ・イヤー「Cloud Dancer（オフホワイト）」制定がトレンド確立を後押し。TikTok/Instagramで「クリーンガール・エステティック」がバズり、ロゴ過多のY2Kへの反動として「何も言わないことで語る」審美観をZ世代が選択。", evolution: "前回（90s-2010s）は「生活感の排除・彫刻的なシルエット」が軸で、フィービー・フィロ型の知的ミニマリズムが主体。今回（2025-26）は素材感・レイヤリングの「テクスチャー差」で表情を作る立体的なホワイト。くたっとした素材・あえての垂れ感を混入させる余白の美が加わっている。", timeline: [{ year: "1990年代中盤", event: "ヘルムート・ラング、ジル・サンダーらが90sミニマリズムを確立。白・黒・グレーの無彩色コーデが高感度層に浸透" }, { year: "2008–2017", event: "フィービー・フィロがセリーヌのCDに就任し「セリーヌ・エフェクト」を起こす。クリーンラインの白ニットや白コートがストリートに波及" }, { year: "2022–2023", event: "「クワイエットラグジュアリー」がTikTokで爆発的に広まる。フィービー・フィロが自身ブランド「A1」を2023年10月にローンチし再熱" }, { year: "2025年9月", event: "ジル・サンダーSS26でクリスプなホワイトを軸にした「ミニマリズム再定義」コレクション。トーテムがNYFWで白×黒完全モノクロームコレクションを発表" }, { year: "2026年", event: "パントーン「Cloud Dancer」選定。パリコレFW26でホワイト単色構成が複数ブランドで確認され、SS26-FW26跨ぎでトレンド確立" }], keyPlayers: "Jil Sander（シモーヌ・ベロッティ）・Toteme・The Row・フィービー・フィロ自身ブランド / フィービー・フィロ（セリーヌ2008-17）・ヘルムート・ラング / TikTokの「クリーンガール・エステティック」タグ" },
  "ジェリー素材": { prevPeak: "1980年代後半〜1990年代前半、および2000年代初頭（Y2K期）", prevPeakYear: "1985–1995 / 2000–2005", prevPeakPct: 65, currPct: 88, whyNow: "Z世代によるY2Kノスタルジア再評価とTikTok上でのバイラル拡散が主因。The Row・Skimsなどのコラボが2024〜2025年に相次ぎ「高級品」として再文脈化。「ジェリーガールサマー」タグで2025年夏にTikTok爆発し2026年春夏の主要トレンドとして定着。", evolution: "前回（80〜90年代）は子供・マス向けの安価な夏物アイテムでキッチュな文脈。今回はThe Row・Chloé・Gucci・Valentino等のラグジュアリーブランドが採用し「高級素材」として格上げ。サステナビリティの文脈で語られる点、「中身を見せる」スタイリングがSNS映えとして積極活用される点が旧来と異なる。", timeline: [{ year: "1979–1980", event: "ブラジルのMelissaが「Melissa Aranha」を発売。石油危機下で革の代替として誕生" }, { year: "1983–1990", event: "ブルームingdale'sがPVCシューズを大量発注しアメリカで大流行。マドンナ・ダイアナ妃が着用し文化的象徴に" }, { year: "1995–2003", event: "Y2KブームでグリッターキャンディカラーのジェリーアクセサリーがMelissaの黄金期に" }, { year: "2024", event: "ジェニファー・ローレンスがThe Rowのネット地ジェリーフラットを着用しバイラル化。Skims・ChloeがSS2025コレクションに採用" }, { year: "2025–2026", event: "TikTokで「Jelly Birkin」「ジェリーガールサマー」が爆発。Gucci・Valentino等ラグジュアリー各社がランウェイに投入し定番トレンド化" }], keyPlayers: "Melissa（原点・ブラジル）・The Row・Skims・Chloé・Gucci・Valentino / Jennifer Lawrence（The Row着用でバイラル）・Rihanna（Fenty Puma）/ TikTok（Jelly Birkin・ジェリーガールサマータグ）" },
  "3Dプリントプロダクト": { prevPeak: "2012〜2015年（ハイファッション・メイカームーブメント期）", prevPeakYear: "2012–2015", prevPeakPct: 55, currPct: 82, whyNow: "AI画像生成→Meshy AI/Tripo AIによる3Dモデル変換（数秒）→家庭用Bambu Labプリンターで出力、という3工程が2024〜2025年に一般人レベルで完結するように。以前は「3Dモデリングができる人だけ」の領域だったが、AIが技術ハードルを消滅させた。", evolution: "前回（2012〜2015年）はIris van HerpenらのハイファッションデザイナーやMaterialiseなどの産業向け企業が主役で、一般人には無縁の「未来技術ショーケース」。2024〜2026年の復活は「デザインの民主化」が核心。モデリング知識ゼロのクリエイターが独自グッズをSNSで設計・販売できる時代に。", timeline: [{ year: "2010", event: "Iris van HerpenがMaterialiseと共に3Dプリントクチュールを発表。アムステルダムFWに登場し業界に衝撃" }, { year: "2012–2014", event: "van HerpenがパリOC(オートクチュール)に連続参加。MakerBot等でDIYメイカーブームと3Dプリンター普及が同時進行しピーク形成" }, { year: "2015–2022", event: "Gartnerハイプサイクルで「幻滅の谷」へ転落。消費者向けプリンターの品質・速度・素材の限界露呈し沈静化" }, { year: "2023–2024", event: "Meshy AI・Tripo AIが登場。テキスト/画像から数秒でprintable STLを生成。Bambu Labの家庭用高精度プリンターが普及" }, { year: "2026-01", event: "MeshyがCES 2026でAI Creative Labを発表。AI生成3Dモデルをワンクリックで製造パートナー経由の実物商品に変換するプラットフォームを公開" }], keyPlayers: "Iris van Herpen（先駆者）・Materialise・Shapeways / Meshy AI・Tripo AI / VAST・Bambu Lab・MakerWorld" },
  "ペイント剥離エイジング": { prevPeak: "1990年代後半〜2000年代中期（グランジ・パンク・初期ストリートウェア全盛期）", prevPeakYear: "1993–2008", prevPeakPct: 70, currPct: 85, whyNow: "ポストパンデミック世代のZ世代が「作られた完璧さへの反発」として「リアルで不完全なもの」を求めている。TikTokの#Y2KGenZが2026年に23億ビューを突破し、90年代〜2000年代初期の「生きた痕跡」ある服への憧れが爆発。", evolution: "前回はナチュラルな経年劣化または廉価な機械加工（サンドブラスト・漂白）が主流。現在の復活版は日本のboro技法・手作業エイジング・ディスチャージインクによる工芸的アプローチへ進化。前回は「偶然の副産物」として消費されたが今回は意図的な反消費主義のステートメントとして文脈化。価格帯も量販品から数万〜数十万円のラグジュアリーストリートへ高級化。", timeline: [{ year: "1970s–1980s", event: "バンドTシャツ文化の成立。ツアーを経て自然に色落ち・クラック・剥がれが生じ「使用の痕跡」が真正性の証明となる文化が形成" }, { year: "1993–1996", event: "ニルヴァーナ・パール・ジャムなどグランジムーブメントが頂点。クルト・コバーンのボロボロのカーディガンが世界的アイコンに" }, { year: "1994–2005", event: "Neighborhood・Supremeなど日本・米国の初期ストリートウェアが「ヴィンテージウォッシュ」「ディストレスデニム」を商業化" }, { year: "2019–2022", event: "Yuta HosokawaとCali Thornhill DewittがSaint Michael（Saint MXXXXXX）を2020年に設立。日本のboro技法・手作業エイジングで「工芸品としての劣化美学」を高級ストリートとして再定義" }, { year: "2024–2026", event: "TikTok経由でZ世代の90s/Y2Kノスタルジア爆発。AMIRIのショットガンディストレスT、KAPITALのアンティーク的劣化加工がメインストリームに再浮上" }], keyPlayers: "Saint MXXXXXX（Saint Michael）・KAPITAL・AMIRI・Neighborhood・Supreme・Mastermind Japan / Yuta Hosokawa・Cali Thornhill Dewitt / TikTok（#Y2KGenZ 23億ビュー）" },

// ── JS: history panel logic ──
(function() {
  function initHistoryPanel() {
    var backdrop = document.createElement('div');
    backdrop.className = 'km-hist-backdrop';
    backdrop.id = 'km-hist-backdrop';
    backdrop.onclick = closeHistoryPanel;
    document.body.appendChild(backdrop);
    var panel = document.createElement('div');
    panel.className = 'km-hist-panel';
    panel.id = 'km-hist-panel';
    panel.innerHTML = '<div class="km-hist-header"><div class="km-hist-header-text"><div class="km-hist-title" id="km-hist-title"></div><div class="km-hist-subtitle">📅 TREND HISTORY</div></div><button class="km-hist-close" onclick="closeHistoryPanel()">&#x2715;</button></div><div class="km-hist-body" id="km-hist-body"></div>';
    document.body.appendChild(panel);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initHistoryPanel);
  } else {
    initHistoryPanel();
  }
})();

function openHistoryPanel(trendName) {
  var d = historyData[trendName];
  var panel = document.getElementById('km-hist-panel');
  var backdrop = document.getElementById('km-hist-backdrop');
  var titleEl = document.getElementById('km-hist-title');
  var body = document.getElementById('km-hist-body');
  if (!panel || !body) return;
  titleEl.textContent = trendName;
  if (!d) {
    body.innerHTML = '<div style="color:var(--mute);font-size:13px;padding:20px 0;line-height:1.7;">「' + escHtml(trendName) + '」の歴史データはまだ未登録だよ。<br>CORINに追加を依頼してね。</div>';
  } else {
    var tlHtml = d.timeline.map(function(item) {
      return '<div class="km-hist-tl-item"><div class="km-hist-tl-left"><div class="km-hist-tl-dot"></div><div class="km-hist-tl-year">' + escHtml(item.year) + '</div><div class="km-hist-tl-line"></div></div><div class="km-hist-tl-right"><div class="km-hist-tl-event">' + escHtml(item.event) + '</div></div></div>';
    }).join('');
    body.innerHTML =
      '<div class="km-hist-section"><div class="km-hist-section-label">ピーク強度の比較</div><div class="km-hist-bar-wrap">' +
      '<div class="km-hist-bar-row"><div class="km-hist-bar-label">前回ピーク（' + escHtml(d.prevPeak) + '）</div><div class="km-hist-bar-track"><div class="km-hist-bar-fill prev" style="width:' + d.prevPeakPct + '%"></div></div><div class="km-hist-bar-year">' + escHtml(d.prevPeakYear) + '</div></div>' +
      '<div class="km-hist-bar-row"><div class="km-hist-bar-label">現在の流行（2025–2026）</div><div class="km-hist-bar-track"><div class="km-hist-bar-fill curr" style="width:' + d.currPct + '%"></div></div><div class="km-hist-bar-year">2025–2026</div></div>' +
      '</div></div>' +
      '<div class="km-hist-section"><div class="km-hist-section-label">🔄 なぜ今リバイバル？</div><div class="km-hist-text">' + escHtml(d.whyNow) + '</div></div>' +
      '<div class="km-hist-section"><div class="km-hist-section-label">✨ 変容ポイント（前回との違い）</div><div class="km-hist-text">' + escHtml(d.evolution) + '</div></div>' +
      '<div class="km-hist-section"><div class="km-hist-section-label">📌 出来事タイムライン</div><div class="km-hist-timeline">' + tlHtml + '</div></div>' +
      '<div class="km-hist-section"><div class="km-hist-section-label">🏷️ キープレイヤー</div><div class="km-hist-players">' + escHtml(d.keyPlayers) + '</div></div>';
  }
  panel.classList.add('open');
  backdrop.classList.add('open');
}

function closeHistoryPanel() {
  var panel = document.getElementById('km-hist-panel');
  var backdrop = document.getElementById('km-hist-backdrop');
  if (panel) panel.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
}

// ── Init ──
async function init() {
  await loadAll();
  document.getElementById('km-loading').style.display = 'none';
  renderPool(); renderBoard();
  if (!cfg.key) { setTimeout(() => { openSettings(); document.getElementById('s-test').className = 'km-settings-test km-settings-err'; document.getElementById('s-test').textContent = '⚠️ APIキーを入力してね（Cockpit設定から確認できる）'; }, 400); }
}
init();
</script>
