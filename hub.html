<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf6f0">
<title>🦋 Yuriko Hub — リンク集</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A6%8B%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #faf6f0;
    --bg-warm: #f5efe5;
    --card: #ffffff;
    --ink: #1a1410;
    --ink-soft: #4a3f35;
    --muted: #8a7a6a;
    --line: #ece4d4;
    --accent: #6b5a4a;
    --accent-warm: #a89380;
    --shadow-sm: 0 1px 2px rgba(60, 40, 20, 0.04);
    --shadow-md: 0 4px 14px rgba(60, 40, 20, 0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }

  /* --- header --- */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .brand-block { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .brand {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
    font-weight: 400;
  }

  .nav-back {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--card);
    white-space: nowrap;
  }
  .nav-back:hover { background: var(--bg-warm); }

  /* --- search --- */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
    max-width: 480px;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 20px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent-warm);
    box-shadow: var(--shadow-md);
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--muted);
  }

  /* --- tabs --- */
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    margin-bottom: 18px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--card);
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tab .tab-count {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .tab.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .tab.active .tab-count { color: rgba(255,255,255,0.7); }
  .tab:hover:not(.active) { background: var(--bg-warm); border-color: var(--accent-warm); }

  /* --- subchips (HTML categories) --- */
  .subchips {
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .subchips.visible { display: flex; }
  .subchip {
    font-size: 11px;
    padding: 4px 11px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .subchip.active { background: var(--ink-soft); color: white; border-color: var(--ink-soft); }
  .subchip:hover:not(.active) { background: var(--bg-warm); color: var(--ink-soft); }

  /* --- section --- */
  .section { margin-bottom: 26px; }
  .section.hidden { display: none; }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .section-count {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  /* --- grid --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* --- HTML card --- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 92px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent-warm);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    text-decoration: none;
    flex: 1;
  }
  .card-title:hover { color: var(--accent); }
  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
  }
  .card-cat {
    color: var(--accent);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .card-date {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    margin-left: 6px;
  }
  .card-actions {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .action {
    font-size: 10px;
    padding: 2px 7px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--bg);
    color: var(--ink-soft);
    text-decoration: none;
    transition: all 0.1s;
  }
  .action:hover { background: var(--ink); color: white; border-color: var(--ink); }

  /* --- link-card (static items) --- */
  .link-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: all 0.15s;
    position: relative;
    min-height: 84px;
  }
  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent-warm);
  }
  .link-card::after {
    content: "↗";
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .link-card:hover::after {
    color: var(--accent);
    transform: translate(2px, -2px);
  }
  .link-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    padding-right: 20px;
    line-height: 1.4;
  }
  .link-desc {
    font-size: 11px;
    color: var(--accent);
    line-height: 1.4;
  }
  .link-url {
    font-size: 10px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 12px; grid-column: 1 / -1; }

  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* mobile */
  @media (max-width: 640px) {
    .container { padding: 20px 14px 60px; }
    h1 { font-size: 18px; }
    .sub { display: block; margin-left: 0; margin-top: 2px; }
    .grid { grid-template-columns: 1fr; gap: 8px; }
    .tabs { margin-bottom: 14px; }
    .tab { font-size: 12px; padding: 7px 13px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header-row">
    <div class="brand-block">
      <div>
        <div class="brand">YURIKO · HUB</div>
        <h1>🦋 リンク集<span class="sub">最近のHTML・Notion・Drive・公開ページ</span></h1>
      </div>
    </div>
    <a class="nav-back" href="index.html">← Mission Control</a>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="タイトル・案件名・URLで検索...">
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="all">✨ すべて <span class="tab-count" id="cnt-all"></span></button>
    <button class="tab" data-tab="html">📄 HTML <span class="tab-count" id="cnt-html"></span></button>
    <button class="tab" data-tab="pages">🌐 公開ページ <span class="tab-count" id="cnt-pages"></span></button>
    <button class="tab" data-tab="notion">📓 Notion <span class="tab-count" id="cnt-notion"></span></button>
    <button class="tab" data-tab="drive">📁 Drive <span class="tab-count" id="cnt-drive"></span></button>
    <button class="tab" data-tab="tools">🔧 ツール <span class="tab-count" id="cnt-tools"></span></button>
  </div>

  <!-- subchips only for HTML/all -->
  <div class="subchips" id="subchips"></div>

  <!-- HTML -->
  <section class="section" id="sec-html">
    <div class="section-head">
      <div class="section-title">📄 最近のHTML</div>
      <div class="section-count" id="html-count"></div>
    </div>
    <div class="grid" id="html-grid"></div>
  </section>

  <!-- Pages -->
  <section class="section" id="sec-pages">
    <div class="section-head">
      <div class="section-title">🌐 公開ページ</div>
      <div class="section-count" id="pages-count"></div>
    </div>
    <div class="grid" id="pages-grid"></div>
  </section>

  <!-- Notion -->
  <section class="section" id="sec-notion">
    <div class="section-head">
      <div class="section-title">📓 案件 Notion</div>
      <div class="section-count" id="notion-count"></div>
    </div>
    <div class="grid" id="notion-grid"></div>
  </section>

  <!-- Drive -->
  <section class="section" id="sec-drive">
    <div class="section-head">
      <div class="section-title">📁 Google Drive</div>
      <div class="section-count" id="drive-count"></div>
    </div>
    <div class="grid" id="drive-grid"></div>
  </section>

  <!-- Tools -->
  <section class="section" id="sec-tools">
    <div class="section-head">
      <div class="section-title">🔧 よく使う</div>
      <div class="section-count" id="tools-count"></div>
    </div>
    <div class="grid" id="tools-grid"></div>
  </section>

  <footer>
    🦋 YURIKO HUB · noindex · curated by CORIN
  </footer>
</div>

<script src="data.js?v=20260607hub2"></script>
<script>
  // ============ Static data ============
  const PAGES = [
    { name: "Mission Control", desc: "毎朝のコックピット", url: "https://fujimoto-cpu.github.io/dashboard/" },
    { name: "経営ダッシュボード", desc: "KONNEKT 経営数値モック v10", url: "https://fujimoto-cpu.github.io/management-dashboard/" },
    { name: "IPレポート（週次）", desc: "月曜配信・IP関連ニュース", url: "https://fujimoto-cpu.github.io/ip-report/" },
    { name: "X AIトレンド（日次）", desc: "Xで話題のAI投稿10件", url: "https://fujimoto-cpu.github.io/x-ai-trends/" },
    { name: "ファッションレポート", desc: "日本・韓国・世界の日次ファッション", url: "https://fujimoto-cpu.github.io/fashion-report/" },
    { name: "Literature Reader", desc: "文献ノートのスマホ閲覧", url: "https://fujimoto-cpu.github.io/literature/" },
    { name: "RAG ガイド", desc: "社内AI推進・RAG解説", url: "https://fujimoto-cpu.github.io/rag-guide/" },
  ];

  const NOTION = [
    { name: "🗂 マスターインデックス", desc: "全案件リンク横断", url: "https://www.notion.so/34e7f11c9bd0814991faf391588abeb1" },
    { name: "Armillary. 26SS", desc: "プロジェクトリンク一覧", url: "https://www.notion.so/34e7f11c9bd08186a337c5a04caddca3" },
    { name: "LAVANDA", desc: "ボンドロシール・コスメ", url: "https://www.notion.so/3667f11c9bd0817b90c4c480dc0a4620" },
    { name: "kemio 抹茶", desc: "human lounge プロジェクト", url: "https://www.notion.so/3667f11c9bd0819aa4f8dffdca25ad3c" },
  ];

  const DRIVE = [
    { name: "81fes 参考素材", desc: "デザイン参考・素材・資料", url: "https://drive.google.com/drive/u/0/folders/1rDIIOrflwP6Q4LD1eelHz7ldOZyI7FUE" },
  ];

  const TOOLS = [
    { name: "📊 Mission Control", desc: "毎朝の Cockpit", url: "index.html" },
    { name: "📋 議事録ダッシュボード", desc: "会議メモジャーナル", url: "file:///Users/yuriko/Documents/corin/00_%F0%9F%8F%A2%20company/secretary/outputs/2026-05-31_%E8%AD%B0%E4%BA%8B%E9%8C%B2%E3%83%80%E3%83%83%E3%82%B7%E3%83%A5%E3%83%9C%E3%83%BC%E3%83%89.html" },
    { name: "🗂 Obsidian Vault", desc: "corin vault を開く", url: "obsidian://open?vault=corin" },
    { name: "📁 outputs/ INDEX", desc: "HTML 71本の全件リスト", url: "obsidian://advanced-uri?vault=corin&filepath=00_%F0%9F%8F%A2%20company%2Fsecretary%2Foutputs%2FINDEX.md&openmode=tab" },
  ];

  // ============ Recent HTML ============
  const recentItems = (window.CORIN_DATA && window.CORIN_DATA.recent_html) || [];
  const categories = [...new Set(recentItems.map(i => i.category).filter(Boolean))];

  let activeTab = "all";
  let activeCategory = "ALL";
  let searchTerm = "";

  // tab counts
  document.getElementById('cnt-all').textContent = recentItems.length + PAGES.length + NOTION.length + DRIVE.length + TOOLS.length;
  document.getElementById('cnt-html').textContent = recentItems.length;
  document.getElementById('cnt-pages').textContent = PAGES.length;
  document.getElementById('cnt-notion').textContent = NOTION.length;
  document.getElementById('cnt-drive').textContent = DRIVE.length;
  document.getElementById('cnt-tools').textContent = TOOLS.length;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function obsidianUri(wiki) {
    if (!wiki) return null;
    return `obsidian://advanced-uri?vault=corin&filename=${encodeURIComponent(wiki)}&openmode=tab`;
  }
  function matchesSearch(text) {
    if (!searchTerm) return true;
    return text.toLowerCase().includes(searchTerm.toLowerCase());
  }

  function buildSubchips() {
    const wrap = document.getElementById('subchips');
    wrap.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'subchip active';
    allBtn.textContent = `すべて (${recentItems.length})`;
    allBtn.onclick = () => { activeCategory = "ALL"; setActiveSubchip(allBtn); renderHtml(); };
    wrap.appendChild(allBtn);
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'subchip';
      const count = recentItems.filter(i => i.category === cat).length;
      const label = cat.replace(/\s+\d+本$/, '').replace(/^[^\s]+\s/, '');
      btn.textContent = `${label} (${count})`;
      btn.title = cat;
      btn.onclick = () => { activeCategory = cat; setActiveSubchip(btn); renderHtml(); };
      wrap.appendChild(btn);
    });
  }
  function setActiveSubchip(btn) {
    document.querySelectorAll('.subchip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function renderHtml() {
    const grid = document.getElementById('html-grid');
    const count = document.getElementById('html-count');
    const filtered = recentItems.filter(i => {
      if (activeCategory !== "ALL" && i.category !== activeCategory) return false;
      const hay = `${i.title || ''} ${i.wiki || ''} ${i.category || ''}`;
      return matchesSearch(hay);
    });
    count.textContent = `${filtered.length} / ${recentItems.length}`;
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">該当なし</div>';
      return;
    }
    grid.innerHTML = filtered.map(i => {
      const obs = obsidianUri(i.wiki);
      const cat = (i.category || '').replace(/\s+\d+本$/, '');
      return `
        <div class="card">
          <a class="card-title" href="${i.html_url}" target="_blank">${escapeHtml(i.title || i.wiki || '無題')}</a>
          <div class="card-foot">
            <span class="card-cat" title="${escapeHtml(cat)}">${escapeHtml(cat)}</span>
            <span class="card-date">${i.date || ''}</span>
          </div>
          <div class="card-actions">
            <a class="action" href="${i.html_url}" target="_blank">📄 HTML</a>
            ${obs ? `<a class="action" href="${obs}">📝 Obsidian</a>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderStaticGrid(elId, countId, items) {
    const grid = document.getElementById(elId);
    const count = document.getElementById(countId);
    const filtered = items.filter(i => matchesSearch(`${i.name} ${i.desc || ''} ${i.url}`));
    count.textContent = `${filtered.length} / ${items.length}`;
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">該当なし</div>';
      return;
    }
    grid.innerHTML = filtered.map(i => `
      <a class="link-card" href="${i.url}" target="_blank" rel="noopener">
        <div class="link-name">${escapeHtml(i.name)}</div>
        ${i.desc ? `<div class="link-desc">${escapeHtml(i.desc)}</div>` : ''}
        <div class="link-url">${escapeHtml(i.url.replace(/^https?:\/\//, '').replace(/^file:\/\/\//, '/'))}</div>
      </a>
    `).join('');
  }

  function applyTabVisibility() {
    const sections = ['html', 'pages', 'notion', 'drive', 'tools'];
    sections.forEach(s => {
      const el = document.getElementById(`sec-${s}`);
      if (activeTab === 'all' || activeTab === s) {
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    });
    const subchips = document.getElementById('subchips');
    if (activeTab === 'html' || activeTab === 'all') {
      subchips.classList.add('visible');
    } else {
      subchips.classList.remove('visible');
    }
  }

  function renderAll() {
    renderHtml();
    renderStaticGrid('pages-grid', 'pages-count', PAGES);
    renderStaticGrid('notion-grid', 'notion-count', NOTION);
    renderStaticGrid('drive-grid', 'drive-count', DRIVE);
    renderStaticGrid('tools-grid', 'tools-count', TOOLS);
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      activeTab = t.dataset.tab;
      applyTabVisibility();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderAll();
  });

  buildSubchips();
  applyTabVisibility();
  renderAll();
</script>
</body>
</html>
