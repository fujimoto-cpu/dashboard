<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf6f0">
<title>🦋 Yuriko Hub — リンク集</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A6%8B%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #faf6f0;
    --card: #ffffff;
    --ink: #1a1410;
    --ink-soft: #4a3f35;
    --muted: #8a7a6a;
    --line: #ece4d4;
    --accent: #6b5a4a;
    --accent-warm: #a89380;
    --shadow-sm: 0 1px 2px rgba(60, 40, 20, 0.04);
    --shadow-md: 0 4px 14px rgba(60, 40, 20, 0.08);
    --radius: 12px;

    /* category colors — くすんだトーン */
    --c-html: #c97b5a;
    --c-html-bg: #f8ece4;
    --c-pages: #5e8b8a;
    --c-pages-bg: #e8f0ef;
    --c-notion: #3a3530;
    --c-notion-bg: #ece8e2;
    --c-drive: #c8a73f;
    --c-drive-bg: #f6efd9;
    --c-tools: #7e6f8a;
    --c-tools-bg: #ece8ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }

  /* --- header --- */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .brand {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
    font-weight: 400;
  }
  .nav-back {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--card);
    white-space: nowrap;
  }
  .nav-back:hover { background: var(--bg); }

  /* --- search --- */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
    max-width: 480px;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 20px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent-warm);
    box-shadow: var(--shadow-md);
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--muted);
  }

  /* --- tabs --- */
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    margin-bottom: 18px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--card);
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tab .tab-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .tab[data-tab="html"] .tab-dot { background: var(--c-html); }
  .tab[data-tab="pages"] .tab-dot { background: var(--c-pages); }
  .tab[data-tab="notion"] .tab-dot { background: var(--c-notion); }
  .tab[data-tab="drive"] .tab-dot { background: var(--c-drive); }
  .tab[data-tab="tools"] .tab-dot { background: var(--c-tools); }
  .tab[data-tab="all"] .tab-dot {
    background: conic-gradient(var(--c-html), var(--c-pages), var(--c-notion), var(--c-drive), var(--c-tools), var(--c-html));
  }
  .tab .tab-count {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .tab.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .tab.active .tab-count { color: rgba(255,255,255,0.7); }
  .tab:hover:not(.active) { background: var(--card); border-color: var(--accent-warm); }

  /* --- subchips (HTML categories) --- */
  .subchips {
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .subchips.visible { display: flex; }
  .subchip {
    font-size: 11px;
    padding: 4px 11px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .subchip.active { background: var(--c-html); color: white; border-color: var(--c-html); }
  .subchip:hover:not(.active) { background: var(--c-html-bg); color: var(--c-html); border-color: var(--c-html); }

  /* --- section block: tinted backdrop --- */
  .section {
    margin-bottom: 22px;
    padding: 14px 16px 16px;
    border-radius: 16px;
    border: 1px solid var(--line);
  }
  .section.hidden { display: none; }
  .section[data-kind="html"]   { background: var(--c-html-bg);   border-color: #ecd9c9; }
  .section[data-kind="pages"]  { background: var(--c-pages-bg);  border-color: #d6e3e1; }
  .section[data-kind="notion"] { background: var(--c-notion-bg); border-color: #dad4cb; }
  .section[data-kind="drive"]  { background: var(--c-drive-bg);  border-color: #ebdfbb; }
  .section[data-kind="tools"]  { background: var(--c-tools-bg);  border-color: #dad4e0; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .section[data-kind="html"]   .section-title { color: var(--c-html); }
  .section[data-kind="pages"]  .section-title { color: var(--c-pages); }
  .section[data-kind="notion"] .section-title { color: var(--c-notion); }
  .section[data-kind="drive"]  .section-title { color: #9c7e1c; }
  .section[data-kind="tools"]  .section-title { color: var(--c-tools); }
  .section-emoji { font-size: 14px; }
  .section-count {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  /* --- grid --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* --- card base --- */
  .card, .link-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 10px 12px 11px 14px;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border: 1px solid var(--line);
    border-left-width: 4px;
    min-height: 86px;
    position: relative;
  }
  .card:hover, .link-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .section[data-kind="html"]   .card { border-left-color: var(--c-html); }
  .section[data-kind="pages"]  .link-card { border-left-color: var(--c-pages); }
  .section[data-kind="notion"] .link-card { border-left-color: var(--c-notion); }
  .section[data-kind="drive"]  .link-card { border-left-color: var(--c-drive); }
  .section[data-kind="tools"]  .link-card { border-left-color: var(--c-tools); }

  /* category pill */
  .pill {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    line-height: 1.4;
    margin-bottom: 2px;
    width: max-content;
  }
  .section[data-kind="html"]   .pill { background: var(--c-html);   color: white; }
  .section[data-kind="pages"]  .pill { background: var(--c-pages);  color: white; }
  .section[data-kind="notion"] .pill { background: var(--c-notion); color: white; }
  .section[data-kind="drive"]  .pill { background: var(--c-drive);  color: white; }
  .section[data-kind="tools"]  .pill { background: var(--c-tools);  color: white; }

  /* HTML card */
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    text-decoration: none;
    flex: 1;
  }
  .card-title:hover { color: var(--c-html); }
  .card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
  }
  .card-cat {
    color: var(--c-html);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
    font-weight: 500;
  }
  .card-date {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    margin-left: 6px;
  }
  .card-actions {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .action {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 11px;
    border: 1px solid transparent;
    border-radius: 14px;
    text-decoration: none;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    line-height: 1.4;
    box-shadow: 0 1px 2px rgba(60, 40, 20, 0.06);
  }
  .action-html {
    background: var(--c-html-bg);
    color: var(--c-html);
    border-color: rgba(201, 123, 90, 0.2);
  }
  .action-html:hover {
    background: var(--c-html);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(201, 123, 90, 0.3);
  }
  .action-obs {
    background: #ede4f3;
    color: #6b4d8f;
    border-color: rgba(107, 77, 143, 0.2);
  }
  .action-obs:hover {
    background: #6b4d8f;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(107, 77, 143, 0.3);
  }
  .action-copy {
    background: #f0ece4;
    color: var(--accent);
    border-color: rgba(107, 90, 74, 0.2);
  }
  .action-copy:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(107, 90, 74, 0.3);
  }
  .action-copy.copied {
    background: #7ba56b;
    color: white;
    border-color: #7ba56b;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* link-card */
  .link-card::after {
    content: "↗";
    position: absolute;
    top: 11px;
    right: 13px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .link-card:hover::after { transform: translate(2px, -2px); }
  .section[data-kind="pages"]  .link-card:hover::after { color: var(--c-pages); }
  .section[data-kind="notion"] .link-card:hover::after { color: var(--c-notion); }
  .section[data-kind="drive"]  .link-card:hover::after { color: #9c7e1c; }
  .section[data-kind="tools"]  .link-card:hover::after { color: var(--c-tools); }
  .link-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    padding-right: 20px;
    line-height: 1.4;
  }
  .link-desc {
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .link-url {
    font-size: 10px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  .hint {
    background: rgba(255, 255, 255, 0.55);
    border: 1px dashed rgba(201, 123, 90, 0.35);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .hint strong { color: var(--c-html); font-weight: 700; }

  .empty { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; grid-column: 1 / -1; }

  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 640px) {
    .container { padding: 20px 14px 60px; }
    h1 { font-size: 18px; }
    .sub { display: block; margin-left: 0; margin-top: 2px; }
    .grid { grid-template-columns: 1fr; gap: 8px; }
    .tabs { margin-bottom: 14px; }
    .tab { font-size: 12px; padding: 7px 13px; }
    .section { padding: 12px 12px 14px; }
  }
</style>
</head>

  document.getElementById('cnt-drive').textContent = DRIVE.length;
  document.getElementById('cnt-tools').textContent = TOOLS.length;

  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const obsidianUri = wiki => wiki ? `obsidian://advanced-uri?vault=corin&filename=${encodeURIComponent(wiki)}&openmode=tab` : null;
  const matchesSearch = text => !searchTerm || text.toLowerCase().includes(searchTerm.toLowerCase());

  function buildSubchips() {
    const wrap = document.getElementById('subchips');
    wrap.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'subchip active';
    allBtn.textContent = `すべて (${recentItems.length})`;
    allBtn.onclick = () => { activeCategory = "ALL"; setActiveSubchip(allBtn); renderHtml(); };
    wrap.appendChild(allBtn);
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'subchip';
      const count = recentItems.filter(i => i.category === cat).length;
      const label = cat.replace(/\s+\d+本$/, '').replace(/^[^\s]+\s/, '');
      btn.textContent = `${label} (${count})`;
      btn.title = cat;
      btn.onclick = () => { activeCategory = cat; setActiveSubchip(btn); renderHtml(); };
      wrap.appendChild(btn);
    });
  }
  function setActiveSubchip(btn) {
    document.querySelectorAll('.subchip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function renderHtml() {
    const grid = document.getElementById('html-grid');
    const count = document.getElementById('html-count');
    const filtered = recentItems.filter(i => {
      if (activeCategory !== "ALL" && i.category !== activeCategory) return false;
      const hay = `${i.title || ''} ${i.wiki || ''} ${i.category || ''}`;
      return matchesSearch(hay);
    });
    count.textContent = `${filtered.length} / ${recentItems.length}`;
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">該当なし</div>';
      return;
    }
    grid.innerHTML = filtered.map(i => {
      const obs = obsidianUri(i.wiki);
      const cat = (i.category || '').replace(/\s+\d+本$/, '');
      return `
        <div class="card">
          <span class="pill">HTML</span>
          <a class="card-title" href="${i.html_url}" target="_blank">${escapeHtml(i.title || i.wiki || '無題')}</a>
          <div class="card-foot">
            <span class="card-cat" title="${escapeHtml(cat)}">${escapeHtml(cat)}</span>
            <span class="card-date">${i.date || ''}</span>
          </div>
          <div class="card-actions">
            <a class="action action-html" href="${i.html_url}" target="_blank">📄 開く</a>
            ${obs ? `<a class="action action-obs" href="${obs}">📝 Obsidian</a>` : ''}
            <button class="action action-copy" data-copy="${escapeHtml(i.html_url)}">📋 コピー</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderStaticGrid(elId, countId, items, pillLabel) {
    const grid = document.getElementById(elId);
    const count = document.getElementById(countId);
    const filtered = items.filter(i => matchesSearch(`${i.name} ${i.desc || ''} ${i.url}`));
    count.textContent = `${filtered.length} / ${items.length}`;
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">該当なし</div>';
      return;
    }
    grid.innerHTML = filtered.map(i => `
      <a class="link-card" href="${i.url}" target="_blank" rel="noopener">
        <span class="pill">${pillLabel}</span>
        <div class="link-name">${escapeHtml(i.name)}</div>
        ${i.desc ? `<div class="link-desc">${escapeHtml(i.desc)}</div>` : ''}
        <div class="link-url">${escapeHtml(i.url.replace(/^https?:\/\//, '').replace(/^file:\/\/\//, '/'))}</div>
      </a>
    `).join('');
  }

  function applyTabVisibility() {
    const sections = ['html', 'pages', 'notion', 'drive', 'tools'];
    sections.forEach(s => {
      const el = document.getElementById(`sec-${s}`);
      if (activeTab === 'all' || activeTab === s) el.classList.remove('hidden');
      else el.classList.add('hidden');
    });
    const subchips = document.getElementById('subchips');
    if (activeTab === 'html' || activeTab === 'all') subchips.classList.add('visible');
    else subchips.classList.remove('visible');
  }

  function renderAll() {
    renderHtml();
    renderStaticGrid('pages-grid', 'pages-count', PAGES, 'WEB');
    renderStaticGrid('notion-grid', 'notion-count', NOTION, 'NOTION');
    renderStaticGrid('drive-grid', 'drive-count', DRIVE, 'DRIVE');
    renderStaticGrid('tools-grid', 'tools-count', TOOLS, 'TOOL');
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      activeTab = t.dataset.tab;
      applyTabVisibility();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderAll();
  });

  // copy to clipboard (event delegation)
  const toast = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.action-copy');
    if (!btn) return;
    e.preventDefault();
    const path = btn.dataset.copy;
    if (!path) return;
    const writePromise = navigator.clipboard
      ? navigator.clipboard.writeText(path)
      : new Promise((resolve, reject) => {
          // fallback for non-secure contexts
          const ta = document.createElement('textarea');
          ta.value = path;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); resolve(); }
          catch (err) { reject(err); }
          finally { document.body.removeChild(ta); }
        });
    writePromise.then(() => {
      btn.classList.add('copied');
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ コピー済';
      showToast('✓ パスをコピーしたよ。Chromeのアドレスバーに貼り付けてEnter');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = orig;
      }, 1600);
    }).catch(() => {
      showToast('⚠️ コピー失敗。手動で選択してね');
    });
  });

  buildSubchips();
  applyTabVisibility();
  renderAll();
</script>
</body>
</html>
